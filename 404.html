<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — AIOpsForge</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/design-system/tokens.css">
<style>
:root {
  --green: #00FF41; --green-dim: #00cc34;
  --green-glow: rgba(0, 255, 65, 0.15); --green-glow-strong: rgba(0, 255, 65, 0.3);
  --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #161616;
  --bg-card: #1a1a1a; --bg-card-hover: #222222;
  --border: #2a2a2a; --border-green: rgba(0, 255, 65, 0.2);
  --text-primary: #f0f0f0; --text-secondary: #999999; --text-dim: #666666;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --green: #00892e; --green-dim: #006b24;
    --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
    --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
    --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
    --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
  }
}
:root[data-theme="light"] {
  --green: #00892e; --green-dim: #006b24;
  --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
  --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
  --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
  --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
  --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}

/* Background glow */
body::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none; opacity: 0.5;
}

.container {
  text-align: center; position: relative; z-index: 1;
  padding: 24px; max-width: 500px;
}

.error-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(80px, 20vw, 140px);
  font-weight: 700; line-height: 1;
  color: var(--green); opacity: 0.15;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; z-index: 0;
  user-select: none;
}

.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--green);
  margin-bottom: 16px;
}

.title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(24px, 5vw, 36px);
  font-weight: 700; margin-bottom: 12px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 15px; line-height: 1.7;
  margin-bottom: 32px;
}

.path-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-dim);
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 10px 16px; border-radius: 6px;
  margin-bottom: 32px; word-break: break-all;
}

.actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; padding: 12px 24px;
  border-radius: 6px; text-decoration: none;
  transition: all 0.2s; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: var(--green); color: #0a0a0a;
  border: 1px solid var(--green); font-weight: 700;
}
.btn-primary:hover {
  box-shadow: 0 0 20px var(--green-glow-strong);
  transform: translateY(-2px);
}
.btn-secondary {
  background: transparent; color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  color: var(--green); border-color: var(--border-green);
  transform: translateY(-2px);
}

.footer-note {
  margin-top: 48px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-dim);
}

/* Theme toggle */
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer;
  width: 40px; height: 40px; display: flex;
  align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1; border-radius: 8px;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>

<button class="floating-theme-toggle" id="themeToggle">&#9728;</button>

<div class="error-code">404</div>

<div class="container">
  <div class="label">not found</div>
  <h1 class="title">This page doesn't exist</h1>
  <p class="subtitle">The route you're looking for isn't here. It may have moved, or it never existed in the first place.</p>

  <div class="path-display" id="pathDisplay"></div>

  <div class="actions">
    <a href="/" class="btn btn-primary">Go Home</a>
    <a href="javascript:history.back()" class="btn btn-secondary">&larr; Go Back</a>
  </div>

  <p class="footer-note">AIOpsForge &middot; built by an engineer who ships</p>
</div>

<script>
document.getElementById('pathDisplay').textContent = window.location.pathname;

(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeToggle');
  function apply(theme) {
    root.setAttribute('data-theme', theme);
    if (btn) btn.textContent = theme === 'light' ? '\u263E' : '\u2600';
  }
  apply(localStorage.getItem('aof_theme') || 'dark');
  if (btn) btn.addEventListener('click', function() {
    var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    apply(next);
  });
})();
</script>
</body>
</html>
