<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <span class="meta-label">Card · default &amp; hover</span>
  <div style="display:flex;gap:14px">
    <div style="flex:1;background:#121212;border:1px solid #2a2a2a;padding:20px;min-height:130px">
      <div style="font-family:var(--font-mono);font-size:10px;color:#666;letter-spacing:.1em;text-transform:uppercase">DEPLOYMENT</div>
      <div style="font-family:var(--font-display);font-size:20px;color:#fff;margin-top:6px;letter-spacing:-0.02em">prod-01</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#999;margin-top:10px">Ready · 12 m ago</div>
    </div>
    <div style="flex:1;background:#121212;border:1px solid #00FF41;padding:20px;min-height:130px;transform:translateY(-2px);box-shadow:0 0 24px rgba(0,255,65,.08)">
      <div style="font-family:var(--font-mono);font-size:10px;color:#00FF41;letter-spacing:.1em;text-transform:uppercase">DEPLOYMENT · HOVER</div>
      <div style="font-family:var(--font-display);font-size:20px;color:#fff;margin-top:6px;letter-spacing:-0.02em">prod-02</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#999;margin-top:10px">Ready · 4 m ago</div>
    </div>
  </div>
</div></body></html>
