<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row">
    <div class="swatch" style="background:#ff3b30;color:#0a0a0a"><span class="name" style="color:#0a0a0a">DANGER</span><span class="hex" style="color:#0a0a0a;opacity:.7">#FF3B30 · ERROR</span></div>
    <div class="swatch" style="background:#ffb020;color:#0a0a0a"><span class="name" style="color:#0a0a0a">WARN</span><span class="hex" style="color:#0a0a0a;opacity:.7">#FFB020 · PENDING</span></div>
    <div class="swatch" style="background:#00FF41;color:#0a0a0a"><span class="name" style="color:#0a0a0a">SUCCESS</span><span class="hex" style="color:#0a0a0a;opacity:.7">#00FF41 · OK</span></div>
  </div>
  <div style="display:flex;gap:16px;margin-top:12px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em">
    <span style="color:#ff3b30">● ERROR</span>
    <span style="color:#ffb020">● PENDING</span>
    <span style="color:#00FF41">● READY</span>
  </div>
</div></body></html>
