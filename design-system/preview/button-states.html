<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <span class="meta-label">Buttons · primary · secondary · ghost</span>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <button style="height:40px;padding:0 20px;background:#00FF41;color:#0a0a0a;border:0;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer">DEPLOY</button>
    <button style="height:40px;padding:0 20px;background:transparent;color:#fff;border:1px solid #2a2a2a;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer">INSPECT</button>
    <button style="height:40px;padding:0 20px;background:transparent;color:#999;border:0;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer">CANCEL</button>
    <button style="height:40px;padding:0 20px;background:#00FF41;color:#0a0a0a;border:0;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.4;cursor:not-allowed">DISABLED</button>
  </div>
  <div style="display:flex;gap:12px;align-items:center;margin-top:14px">
    <button style="height:32px;padding:0 14px;background:transparent;color:#fff;border:1px solid #2a2a2a;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase">32 · COMPACT</button>
    <button style="height:48px;padding:0 24px;background:#00FF41;color:#0a0a0a;border:0;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase">48 · PROMINENT</button>
  </div>
</div></body></html>
