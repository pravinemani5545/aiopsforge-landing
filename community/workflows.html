<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflows — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/design-system/tokens.css">
<style>
:root {
  --green: #00FF41; --green-dim: #00cc34;
  --green-glow: rgba(0, 255, 65, 0.15); --green-glow-strong: rgba(0, 255, 65, 0.3);
  --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #161616;
  --bg-card: #1a1a1a; --bg-card-hover: #222222;
  --border: #2a2a2a; --border-green: rgba(0, 255, 65, 0.2);
  --text-primary: #f0f0f0; --text-secondary: #999999; --text-dim: #666666;
  --red: #ff4444; --blue: #4488ff;
  --accent: #38bdf8;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --green: #00892e; --green-dim: #006b24;
    --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
    --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
    --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
    --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
    --red: #cc3333; --blue: #2266cc;
    --accent: #0284c7;
  }
}
:root[data-theme="light"] {
  --green: #00892e; --green-dim: #006b24;
  --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
  --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
  --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
  --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
  --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
  --red: #cc3333; --blue: #2266cc;
  --accent: #0284c7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(56, 189, 248, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ INDEX GRID ============ */
.index-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.index-card {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: flex;
  flex-direction: column; gap: 12px;
}
.index-card:hover {
  border-color: var(--border-green); background: var(--bg-card-hover);
}
.index-card-top {
  display: flex; justify-content: space-between; align-items: center;
}
.index-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.complexity-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px;
}
.complexity-badge.beginner {
  color: var(--green); border: 1px solid rgba(0, 255, 65, 0.3);
  background: rgba(0, 255, 65, 0.06);
}
.complexity-badge.intermediate {
  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3);
  background: rgba(234, 179, 8, 0.06);
}
.complexity-badge.advanced {
  color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3);
  background: rgba(255, 68, 68, 0.06);
}
.index-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px;
  font-weight: 700; line-height: 1.3;
}
.index-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.index-card-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============ DETAIL VIEW ============ */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; cursor: pointer;
  transition: color 0.2s; padding: 24px 0 0; border: none;
  background: none;
}
.detail-back:hover { color: var(--green); }
.detail-hero {
  padding: 40px 0 32px; position: relative;
}
.detail-hero::before {
  content: ''; position: absolute; top: -20px; left: 0;
  width: 400px; height: 200px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.detail-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 12px; position: relative;
}
.detail-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(24px, 4vw, 36px);
  font-weight: 700; margin-bottom: 10px; position: relative;
}
.detail-desc {
  color: var(--text-secondary); font-size: 15px;
  max-width: 700px; line-height: 1.7; margin-bottom: 16px; position: relative;
}
.detail-meta-row {
  display: flex; gap: 12px; align-items: center; position: relative;
}

/* ============ DETAIL SECTIONS GRID ============ */
.detail-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.detail-section {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; position: relative;
}
.detail-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}

/* ============ SECTION: PIPELINE ============ */
.pipeline-step {
  padding: 16px 0; border-bottom: 1px solid var(--border);
}
.pipeline-step:last-child { border-bottom: none; }
.pipeline-step-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
}
.pipeline-step-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 18px;
  font-weight: 700; color: var(--accent); min-width: 28px;
  text-align: center;
}
.pipeline-step-title {
  font-size: 14px; font-weight: 600;
}
.pipeline-step-tool {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 2px 6px; color: var(--accent);
  border: 1px solid rgba(56,189,248,0.2);
  background: rgba(56,189,248,0.06);
  margin-left: auto;
}
.pipeline-step-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  padding-left: 40px;
}

/* ============ SECTION: REQUIREMENTS ============ */
.req-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; margin-top: 16px;
}
.req-sub:first-child { margin-top: 0; }
.req-list { display: flex; flex-direction: column; gap: 8px; }
.req-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
}
.req-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 1px 6px; letter-spacing: 0.5px; text-transform: uppercase;
}
.req-badge.free {
  color: var(--green); border: 1px solid rgba(0,255,65,0.3);
  background: rgba(0,255,65,0.06);
}
.req-badge.paid {
  color: #eab308; border: 1px solid rgba(234,179,8,0.3);
  background: rgba(234,179,8,0.06);
}
.req-keys {
  list-style: none; padding: 0;
}
.req-keys li {
  font-size: 13px; color: var(--text-secondary);
  padding: 3px 0 3px 16px; position: relative;
}
.req-keys li::before {
  content: '>'; position: absolute; left: 0;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.req-setup {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--accent); margin-top: 16px;
  padding: 8px 12px; background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  display: inline-block;
}

/* ============ SECTION: CONFIGURATION ============ */
.config-step {
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.config-step:last-child { border-bottom: none; }
.config-step-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.config-step-num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--accent); font-weight: 700;
}
.config-step-title {
  font-size: 14px; font-weight: 600;
}
.config-step-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  padding-left: 28px;
}

/* ============ SECTION: CUSTOMIZATION ============ */
.custom-list { display: flex; flex-direction: column; gap: 16px; }
.custom-item {
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.custom-item:last-child { border-bottom: none; padding-bottom: 0; }
.custom-num {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 700; color: var(--accent); display: inline-block;
  margin-right: 8px;
}
.custom-title {
  font-size: 14px; font-weight: 600; display: inline;
}
.custom-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  margin-top: 6px;
}
.placeholder-text {
  font-size: 13px; color: var(--text-dim); font-style: italic;
  padding: 20px 0;
}

/* ============ SANDBOX BANNER ============ */
.sandbox-banner {
  background: rgba(0,255,65,0.06); border-bottom: 1px solid rgba(0,255,65,0.15);
  padding: 10px 24px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); display: none;
}
.sandbox-banner.visible { display: block; }
.sandbox-banner a {
  color: var(--green); text-decoration: none; font-weight: 700;
}
.sandbox-banner a:hover { text-decoration: underline; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .index-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .index-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .detail-hero { padding: 32px 0 24px; }
  .detail-meta-row { flex-wrap: wrap; }
  .pipeline-step-desc { padding-left: 0; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

// ============ STATE ============
var activeFilter = 'all';

// ============ HELPERS ============
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function findById(id) {
  for (var i = 0; i < WORKFLOWS_DATA.length; i++) {
    if (WORKFLOWS_DATA[i].id === id) return WORKFLOWS_DATA[i];
  }
  return null;
}

function getFiltered() {
  if (activeFilter === 'all') return WORKFLOWS_DATA;
  return WORKFLOWS_DATA.filter(function(w) { return w.category === activeFilter; });
}

// ============ ROUTING ============
function route() {
  var hash = window.location.hash.slice(1);
  var item = hash ? findById(hash) : null;
  if (item) {
    showDetail(item);
  } else {
    showIndex();
  }
}

function showIndex() {
  document.getElementById('indexView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  document.title = 'Workflows \u2014 AIOpsForge';
  renderStats();
  renderFilters();
  renderGrid();
  window.scrollTo(0, 0);
}

function showDetail(item) {
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.title = item.title + ' \u2014 AIOpsForge Workflows';
  renderDetailHeader(item);
  renderDetailSections(item);
  window.scrollTo(0, 0);
}

function goBack() {
  history.pushState('', '', window.location.pathname);
  showIndex();
}

// ============ INDEX RENDERING ============
function renderStats() {
  var cats = {};
  WORKFLOWS_DATA.forEach(function(w) { cats[w.category] = true; });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + WORKFLOWS_DATA.length + '</span><span class="stat-label">workflows</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(cats).length + '</span><span class="stat-label">categories</span></div>';
}

function renderFilters() {
  var cats = {};
  WORKFLOWS_DATA.forEach(function(w) { cats[w.category] = (cats[w.category] || 0) + 1; });
  var html = '<button class="filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(cats).forEach(function(c) {
    html += '<button class="filter-btn' + (activeFilter === c ? ' active' : '') + '" onclick="setFilter(\'' + c + '\', this)">' + c + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function renderGrid() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(w) {
    var compClass = w.complexity.toLowerCase();
    html += '<a class="index-card" href="#' + w.id + '">' +
      '<div class="index-card-top">' +
        '<span class="index-card-tag">' + escapeHtml(w.category) + '</span>' +
        '<span class="complexity-badge ' + compClass + '">' + escapeHtml(w.complexity) + '</span>' +
      '</div>' +
      '<h3 class="index-card-title">' + escapeHtml(w.title) + '</h3>' +
      '<p class="index-card-desc">' + escapeHtml(w.oneLiner) + '</p>' +
      '<span class="index-card-meta">' + w.steps.length + ' steps</span>' +
    '</a>';
  });
  if (filtered.length === 0) {
    html = '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center; padding:40px 0;">No workflows in this category yet.</p>';
  }
  document.getElementById('indexGrid').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// ============ DETAIL RENDERING ============
function renderDetailHeader(item) {
  var compClass = item.complexity.toLowerCase();
  document.getElementById('detailHeader').innerHTML =
    '<button class="detail-back" onclick="goBack()">&larr; back to all workflows</button>' +
    '<div class="detail-hero">' +
      '<div class="detail-tag">' + escapeHtml(item.category) + '</div>' +
      '<h1 class="detail-title">' + escapeHtml(item.title) + '</h1>' +
      '<p class="detail-desc">' + escapeHtml(item.oneLiner) + '</p>' +
      '<div class="detail-meta-row">' +
        '<span class="complexity-badge ' + compClass + '">' + escapeHtml(item.complexity) + '</span>' +
        '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--text-dim)">' + item.steps.length + ' steps</span>' +
      '</div>' +
    '</div>';
}

function renderDetailSections(item) {
  var html = '';

  // Section 1: PIPELINE
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">pipeline</span></div>';
  if (item.steps && item.steps.length > 0) {
    item.steps.forEach(function(step, i) {
      html += '<div class="pipeline-step">' +
        '<div class="pipeline-step-header">' +
          '<span class="pipeline-step-num">' + (i + 1) + '</span>' +
          '<span class="pipeline-step-title">' + escapeHtml(step.name) + '</span>' +
          '<span class="pipeline-step-tool">' + escapeHtml(step.tool) + '</span>' +
        '</div>' +
        '<div class="pipeline-step-desc">' + escapeHtml(step.description) + '</div>' +
      '</div>';
    });
  }
  html += '</div>';

  // Section 2: REQUIREMENTS
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">requirements</span></div>';
  if (item.requirements) {
    html += '<div class="req-sub">tools</div><div class="req-list">';
    item.requirements.tools.forEach(function(t) {
      html += '<div class="req-item">' +
        '<span class="req-badge ' + t.tier + '">' + t.tier + '</span>' +
        '<span>' + escapeHtml(t.name) + (t.note ? ' — ' + escapeHtml(t.note) : '') + '</span>' +
      '</div>';
    });
    html += '</div>';
    if (item.requirements.apiKeys && item.requirements.apiKeys.length > 0) {
      html += '<div class="req-sub">api keys needed</div><ul class="req-keys">';
      item.requirements.apiKeys.forEach(function(k) {
        html += '<li>' + escapeHtml(k) + '</li>';
      });
      html += '</ul>';
    }
    if (item.requirements.setupTime) {
      html += '<div class="req-setup">setup time: ' + escapeHtml(item.requirements.setupTime) + '</div>';
    }
  } else {
    html += '<p class="placeholder-text">Requirements will be documented as this workflow is developed.</p>';
  }
  html += '</div>';

  // Section 3: CONFIGURATION
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">configuration</span></div>';
  if (item.configuration && item.configuration.length > 0) {
    item.configuration.forEach(function(c, i) {
      html += '<div class="config-step">' +
        '<div class="config-step-header">' +
          '<span class="config-step-num">' + (i + 1) + '.</span>' +
          '<span class="config-step-title">' + escapeHtml(c.title) + '</span>' +
        '</div>' +
        '<div class="config-step-desc">' + escapeHtml(c.instructions) + '</div>' +
      '</div>';
    });
  } else {
    html += '<p class="placeholder-text">Configuration guide coming soon.</p>';
  }
  html += '</div>';

  // Section 4: CUSTOMIZATION
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">customization</span></div>';
  if (item.customizations && item.customizations.length > 0) {
    html += '<div class="custom-list">';
    item.customizations.forEach(function(c, i) {
      html += '<div class="custom-item">' +
        '<span class="custom-num">' + (i + 1) + '</span>' +
        '<span class="custom-title">' + escapeHtml(c.title) + '</span>' +
        '<div class="custom-desc">' + escapeHtml(c.description) +
          (c.changes ? '<br><br><strong style="color:var(--text-primary)">What to change:</strong> ' + escapeHtml(c.changes) : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="placeholder-text">Customization options coming soon.</p>';
  }
  html += '</div>';

  document.getElementById('detailGrid').innerHTML = html;
}

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();
