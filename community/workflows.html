<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflows — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/design-system/tokens.css">
<style>
:root {
  --accent: #38bdf8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998; pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 256px 256px;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }

/* ============ GRADIENT HEADING ============ */
.gradient-heading {
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ============ FADING DIVIDER ============ */
.section-divider {
  border: none; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--border) 80%, transparent 100%);
  margin: 0;
}

/* ============ PAGE HEADER ============ */
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; inset: -100px -20vw 0;
  background:
    radial-gradient(ellipse at 40% 40%, rgba(56,189,248,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 50%, rgba(0,255,65,0.08) 0%, transparent 45%);
  pointer-events: none;
}
.page-header::after {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size: 32px 32px; pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(56, 189, 248, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ INDEX GRID ============ */
.index-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.index-card {
  --card-glow-size: 180px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: flex;
  flex-direction: column; gap: 12px; position: relative;
  overflow: hidden;
}
.index-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(56,189,248,0.09) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.index-card:hover::before { opacity: 1; }
.index-card:hover {
  border-color: rgba(56, 189, 248, 0.24); background: var(--bg-card-hover);
}
.index-card-top {
  display: flex; justify-content: space-between; align-items: center;
}
.index-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.complexity-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px;
}
.complexity-badge.beginner {
  color: var(--green); border: 1px solid rgba(0, 255, 65, 0.3);
  background: rgba(0, 255, 65, 0.06);
}
.complexity-badge.intermediate {
  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3);
  background: rgba(234, 179, 8, 0.06);
}
.complexity-badge.advanced {
  color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3);
  background: rgba(255, 68, 68, 0.06);
}
.index-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px;
  font-weight: 700; line-height: 1.3;
}
.index-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.index-card-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============ DETAIL VIEW ============ */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; cursor: pointer;
  transition: color 0.2s; padding: 24px 0 0; border: none;
  background: none;
}
.detail-back:hover { color: var(--green); }
.detail-hero {
  padding: 40px 0 32px; position: relative;
}
.detail-hero::before {
  content: ''; position: absolute; inset: -60px -20vw 0;
  background: radial-gradient(ellipse at 20% 40%, rgba(56,189,248,0.1) 0%, transparent 45%);
  pointer-events: none;
}
.detail-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 12px; position: relative;
}
.detail-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(24px, 4vw, 36px);
  font-weight: 700; margin-bottom: 10px; position: relative;
}
.detail-desc {
  color: var(--text-secondary); font-size: 15px;
  max-width: 700px; line-height: 1.7; margin-bottom: 16px; position: relative;
}
.detail-meta-row {
  display: flex; gap: 12px; align-items: center; position: relative;
}

/* ============ DETAIL SECTIONS (vertical stacked) ============ */
.detail-sections {
  display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px;
}
.detail-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.detail-section {
  --card-glow-size: 56px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; position: relative;
  overflow: hidden; transition: border-color 0.2s, background 0.2s;
}
.detail-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.detail-section::after {
  content: ''; position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(56,189,248,0.038) 0%, transparent 42%);
}
.detail-section:hover { border-color: rgba(56, 189, 248, 0.22); background: var(--bg-card-hover); }
.detail-section:hover::after { opacity: 0.7; }
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}

/* ============ PIPELINE (with connecting line) ============ */
.pipeline { position: relative; padding-left: 48px; }
.pipeline::before {
  content: ''; position: absolute; left: 15px; top: 24px; bottom: 24px; width: 1px;
  background: linear-gradient(180deg, var(--accent) 0%, var(--border) 30%, var(--border) 70%, transparent 100%);
}
.pipeline-step { position: relative; padding: 20px 0; border-bottom: 1px solid var(--border); }
.pipeline-step:last-child { border-bottom: none; }
.pipeline-num {
  position: absolute; left: -48px; top: 20px; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
  color: var(--accent); border: 1px solid rgba(56,189,248,0.3); background: var(--bg-primary);
}
.pipeline-step-title {
  font-size: 14px; font-weight: 600; margin-bottom: 4px;
}
.pipeline-step-tool {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 2px 6px; color: var(--accent);
  border: 1px solid rgba(56,189,248,0.2);
  background: rgba(56,189,248,0.06);
  display: inline-block; margin-bottom: 8px;
}
.pipeline-step-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}

/* ============ REQUIREMENTS ============ */
.req-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; margin-top: 16px;
}
.req-sub:first-child { margin-top: 0; }
.req-list { display: flex; flex-direction: column; gap: 8px; }
.req-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
}
.req-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 1px 6px; letter-spacing: 0.5px; text-transform: uppercase;
}
.req-badge.free {
  color: var(--green); border: 1px solid rgba(0,255,65,0.3);
  background: rgba(0,255,65,0.06);
}
.req-badge.paid {
  color: #eab308; border: 1px solid rgba(234,179,8,0.3);
  background: rgba(234,179,8,0.06);
}
.req-keys { list-style: none; padding: 0; }
.req-keys li {
  font-size: 13px; color: var(--text-secondary);
  padding: 3px 0 3px 16px; position: relative;
}
.req-keys li::before {
  content: '>'; position: absolute; left: 0;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* ============ SETUP & COST ============ */
.setup-grid { display: flex; flex-direction: column; gap: 16px; }
.setup-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.setup-row:last-child { border-bottom: none; }
.setup-key {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
}
.setup-val { font-size: 13px; color: var(--text-secondary); }

/* ============ WALKTHROUGH (expandable) ============ */
.walkthrough-step { --card-glow-size: 52px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.walkthrough-step:last-child { border-bottom: none; }
.walkthrough-step::after {
  content: ''; position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(56,189,248,0.032) 0%, transparent 40%);
}
.walkthrough-step:hover::after { opacity: 0.62; }
.walkthrough-header {
  display: flex; align-items: center; gap: 12px; padding: 16px 0; cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px;
}
.walkthrough-header::after {
  content: '+'; margin-left: auto; font-family: 'JetBrains Mono', monospace;
  color: var(--accent); font-size: 18px; transition: transform 0.2s;
}
.walkthrough-step.open .walkthrough-header::after { transform: rotate(45deg); }
.walkthrough-body { display: none; padding: 0 0 16px 36px; }
.walkthrough-step.open .walkthrough-body { display: block; }
.walkthrough-body p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 12px; }
.walkthrough-body p:last-child { margin-bottom: 0; }
.walkthrough-num {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--accent); min-width: 24px;
}

/* ============ CONFIGURATION ============ */
.config-step {
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.config-step:last-child { border-bottom: none; }
.config-step-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.config-step-num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--accent); font-weight: 700;
}
.config-step-title {
  font-size: 14px; font-weight: 600;
}
.config-step-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  padding-left: 28px;
}

/* ============ EXAMPLE RUN ============ */
.example-run { background: var(--bg-card); border: 1px solid var(--border); padding: 24px; }
.run-scenario { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
.run-step { padding: 12px 0; border-bottom: 1px solid var(--border); }
.run-step:last-child { border-bottom: none; }
.run-step-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
}
.run-step-result {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  padding: 8px 12px; background: var(--bg-tertiary); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}

/* ============ CUSTOMIZATION ============ */
.custom-list { display: flex; flex-direction: column; gap: 16px; }
.custom-item {
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.custom-item:last-child { border-bottom: none; padding-bottom: 0; }
.custom-num {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 700; color: var(--accent); display: inline-block;
  margin-right: 8px;
}
.custom-title {
  font-size: 14px; font-weight: 600; display: inline;
}
.custom-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  margin-top: 6px;
}

/* ============ TROUBLESHOOTING ============ */
.trouble-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
.trouble-item:last-child { border-bottom: none; }
.trouble-issue {
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px;
  margin-bottom: 8px;
}
.trouble-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
}
.trouble-label.cause { color: var(--warn); }
.trouble-label.fix { color: var(--green); }
.trouble-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

/* ============ PLACEHOLDER ============ */
.placeholder-text {
  font-size: 13px; color: var(--text-dim); font-style: italic;
  padding: 20px 0;
}

/* ============ SANDBOX BANNER ============ */
.sandbox-banner {
  background: rgba(0,255,65,0.06); border-bottom: 1px solid rgba(0,255,65,0.15);
  padding: 10px 24px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); display: none;
}
.sandbox-banner.visible { display: block; }
.sandbox-banner a {
  color: var(--green); text-decoration: none; font-weight: 700;
}
.sandbox-banner a:hover { text-decoration: underline; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .index-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .detail-row { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .index-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .detail-hero { padding: 32px 0 24px; }
  .detail-meta-row { flex-wrap: wrap; }
  .pipeline { padding-left: 40px; }
  .pipeline-num { left: -40px; width: 26px; height: 26px; font-size: 11px; }
  .walkthrough-body { padding-left: 24px; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

// ============ STATE ============
var activeFilter = 'all';

// ============ HELPERS ============
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function findById(id) {
  for (var i = 0; i < WORKFLOWS_DATA.length; i++) {
    if (WORKFLOWS_DATA[i].id === id) return WORKFLOWS_DATA[i];
  }
  return null;
}

function getFiltered() {
  if (activeFilter === 'all') return WORKFLOWS_DATA;
  return WORKFLOWS_DATA.filter(function(w) { return w.category === activeFilter; });
}

// ============ ROUTING ============
function route() {
  var hash = window.location.hash.slice(1);
  var item = hash ? findById(hash) : null;
  if (item) {
    showDetail(item);
  } else {
    showIndex();
  }
}

function showIndex() {
  document.getElementById('indexView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  document.title = 'Workflows \u2014 AIOpsForge';
  renderStats();
  renderFilters();
  renderGrid();
  window.scrollTo(0, 0);
}

function showDetail(item) {
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.title = item.title + ' \u2014 AIOpsForge Workflows';
  renderDetailHeader(item);
  renderDetailSections(item);
  window.scrollTo(0, 0);
}

function goBack() {
  history.pushState('', '', window.location.pathname);
  showIndex();
}

// ============ INDEX RENDERING ============
function renderStats() {
  var cats = {};
  WORKFLOWS_DATA.forEach(function(w) { cats[w.category] = true; });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + WORKFLOWS_DATA.length + '</span><span class="stat-label">workflows</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(cats).length + '</span><span class="stat-label">categories</span></div>';
}

function renderFilters() {
  var cats = {};
  WORKFLOWS_DATA.forEach(function(w) { cats[w.category] = (cats[w.category] || 0) + 1; });
  var html = '<button class="filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(cats).forEach(function(c) {
    html += '<button class="filter-btn' + (activeFilter === c ? ' active' : '') + '" onclick="setFilter(\'' + c + '\', this)">' + c + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function renderGrid() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(w) {
    var compClass = w.complexity.toLowerCase();
    html += '<a class="index-card" href="#' + w.id + '">' +
      '<div class="index-card-top">' +
        '<span class="index-card-tag">' + escapeHtml(w.category) + '</span>' +
        '<span class="complexity-badge ' + compClass + '">' + escapeHtml(w.complexity) + '</span>' +
      '</div>' +
      '<h3 class="index-card-title">' + escapeHtml(w.title) + '</h3>' +
      '<p class="index-card-desc">' + escapeHtml(w.oneLiner) + '</p>' +
      '<span class="index-card-meta">' + w.steps.length + ' steps</span>' +
    '</a>';
  });
  if (filtered.length === 0) {
    html = '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center; padding:40px 0;">No workflows in this category yet.</p>';
  }
  document.getElementById('indexGrid').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// ============ DETAIL RENDERING ============
function renderDetailHeader(item) {
  var compClass = item.complexity.toLowerCase();
  document.getElementById('detailHeader').innerHTML =
    '<button class="detail-back" onclick="goBack()">&larr; back to all workflows</button>' +
    '<div class="detail-hero">' +
      '<div class="detail-tag">' + escapeHtml(item.category) + '</div>' +
      '<h1 class="detail-title gradient-heading">' + escapeHtml(item.title) + '</h1>' +
      '<p class="detail-desc">' + escapeHtml(item.oneLiner) + '</p>' +
      '<div class="detail-meta-row">' +
        '<span class="complexity-badge ' + compClass + '">' + escapeHtml(item.complexity) + '</span>' +
        '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--text-dim)">' + item.steps.length + ' steps</span>' +
        (item.estimatedCost ? '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--accent)">' + escapeHtml(item.estimatedCost) + '</span>' : '') +
      '</div>' +
    '</div>';
}

function renderDetailSections(item) {
  var html = '';

  // ---- Section 1: PIPELINE OVERVIEW (full-width) ----
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">pipeline overview</span></div>';
  if (item.steps && item.steps.length > 0) {
    html += '<div class="pipeline">';
    item.steps.forEach(function(step, i) {
      html += '<div class="pipeline-step">' +
        '<span class="pipeline-num">' + (i + 1) + '</span>' +
        '<div class="pipeline-step-title">' + escapeHtml(step.name) + '</div>' +
        '<span class="pipeline-step-tool">' + escapeHtml(step.tool) + '</span>' +
        '<div class="pipeline-step-desc">' + escapeHtml(step.description) + '</div>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // ---- Section 2: REQUIREMENTS | SETUP & COST (side-by-side) ----
  html += '<div class="detail-row">';

  // Left: Requirements
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">requirements</span></div>';
  if (item.requirements) {
    html += '<div class="req-sub">tools</div><div class="req-list">';
    item.requirements.tools.forEach(function(t) {
      html += '<div class="req-item">' +
        '<span class="req-badge ' + t.tier + '">' + t.tier + '</span>' +
        '<span>' + escapeHtml(t.name) + (t.note ? ' — ' + escapeHtml(t.note) : '') + '</span>' +
      '</div>';
    });
    html += '</div>';
    if (item.requirements.apiKeys && item.requirements.apiKeys.length > 0) {
      html += '<div class="req-sub">api keys needed</div><ul class="req-keys">';
      item.requirements.apiKeys.forEach(function(k) {
        html += '<li>' + escapeHtml(k) + '</li>';
      });
      html += '</ul>';
    }
  } else {
    html += '<p class="placeholder-text">Requirements will be documented as this workflow is developed.</p>';
  }
  html += '</div>';

  // Right: Setup & Cost
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">setup &amp; cost</span></div>' +
    '<div class="setup-grid">';
  html += '<div class="setup-row"><span class="setup-key">Setup Time</span><span class="setup-val">' + escapeHtml(item.requirements ? item.requirements.setupTime || 'Varies' : 'Varies') + '</span></div>';
  html += '<div class="setup-row"><span class="setup-key">Est. Cost</span><span class="setup-val">' + escapeHtml(item.estimatedCost || 'Varies') + '</span></div>';
  html += '<div class="setup-row"><span class="setup-key">Difficulty</span><span class="setup-val">' + escapeHtml(item.difficulty || item.complexity) + '</span></div>';
  html += '<div class="setup-row"><span class="setup-key">Steps</span><span class="setup-val">' + item.steps.length + '</span></div>';
  html += '</div></div>';

  html += '</div>'; // close .detail-row

  // ---- Section 3: STEP-BY-STEP WALKTHROUGH (full-width) ----
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">step-by-step walkthrough</span></div>';
  if (item.stepByStep && item.stepByStep.length > 0) {
    item.stepByStep.forEach(function(s) {
      var paragraphs = s.detail.split('\n\n');
      html += '<div class="walkthrough-step" onclick="this.classList.toggle(\'open\')">' +
        '<div class="walkthrough-header">' +
          '<span class="walkthrough-num">' + s.step + '.</span>' +
          '<span>' + escapeHtml(s.title) + '</span>' +
        '</div>' +
        '<div class="walkthrough-body">';
      paragraphs.forEach(function(p) {
        html += '<p>' + escapeHtml(p) + '</p>';
      });
      html += '</div></div>';
    });
  } else {
    html += '<p class="placeholder-text">Detailed walkthrough coming soon.</p>';
  }
  html += '</div>';

  // ---- Section 4: CONFIGURATION (full-width) ----
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">configuration</span></div>';
  if (item.configuration && item.configuration.length > 0) {
    item.configuration.forEach(function(c, i) {
      html += '<div class="config-step">' +
        '<div class="config-step-header">' +
          '<span class="config-step-num">' + (i + 1) + '.</span>' +
          '<span class="config-step-title">' + escapeHtml(c.title) + '</span>' +
        '</div>' +
        '<div class="config-step-desc">' + escapeHtml(c.instructions) + '</div>' +
      '</div>';
    });
  } else {
    html += '<p class="placeholder-text">Configuration guide coming soon.</p>';
  }
  html += '</div>';

  // ---- Section 5: EXAMPLE RUN (full-width) ----
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">example run</span></div>';
  if (item.exampleRun) {
    html += '<div class="example-run">' +
      '<div class="run-scenario"><strong style="color:var(--text-primary)">Scenario:</strong> ' + escapeHtml(item.exampleRun.scenario) + '</div>';
    item.exampleRun.steps.forEach(function(s) {
      html += '<div class="run-step">' +
        '<div class="run-step-label">' + escapeHtml(s.label) + '</div>' +
        '<div class="run-step-result">' + escapeHtml(s.result) + '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="placeholder-text">Example run coming soon.</p>';
  }
  html += '</div>';

  // ---- Section 6: CUSTOMIZATION OPTIONS (full-width) ----
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">customization options</span></div>';
  if (item.customizations && item.customizations.length > 0) {
    html += '<div class="custom-list">';
    item.customizations.forEach(function(c, i) {
      html += '<div class="custom-item">' +
        '<span class="custom-num">' + (i + 1) + '</span>' +
        '<span class="custom-title">' + escapeHtml(c.title) + '</span>' +
        '<div class="custom-desc">' + escapeHtml(c.description) +
          (c.changes ? '<br><br><strong style="color:var(--text-primary)">What to change:</strong> ' + escapeHtml(c.changes) : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="placeholder-text">Customization options coming soon.</p>';
  }
  html += '</div>';

  // ---- Section 7: TROUBLESHOOTING (full-width) ----
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">troubleshooting</span></div>';
  if (item.troubleshooting && item.troubleshooting.length > 0) {
    item.troubleshooting.forEach(function(t) {
      html += '<div class="trouble-item">' +
        '<div class="trouble-issue">' + escapeHtml(t.issue) + '</div>' +
        '<div class="trouble-label cause">cause</div>' +
        '<div class="trouble-text">' + escapeHtml(t.cause) + '</div>' +
        '<div class="trouble-label fix" style="margin-top:8px">fix</div>' +
        '<div class="trouble-text">' + escapeHtml(t.fix) + '</div>' +
      '</div>';
    });
  } else {
    html += '<p class="placeholder-text">Troubleshooting guide coming soon.</p>';
  }
  html += '</div>';

  document.getElementById('detailSections').innerHTML = html;
}

// ============ CURSOR TRACKING GLOW ============
(function() {
  document.addEventListener('mousemove', function(e) {
    var cards = document.querySelectorAll('.index-card, .detail-section, .walkthrough-step');
    cards.forEach(function(card) {
      var rect = card.getBoundingClientRect();
      card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
      card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
    });
  });
})();

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();
