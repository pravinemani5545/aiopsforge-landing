<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00FF41; --green-dim: #00cc34;
  --green-glow: rgba(0, 255, 65, 0.15); --green-glow-strong: rgba(0, 255, 65, 0.3);
  --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #161616;
  --bg-card: #1a1a1a; --bg-card-hover: #222222;
  --border: #2a2a2a; --border-green: rgba(0, 255, 65, 0.2);
  --text-primary: #f0f0f0; --text-secondary: #999999; --text-dim: #666666;
  --red: #ff4444; --blue: #4488ff;
  --accent: #eab308;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --green: #00892e; --green-dim: #006b24;
    --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
    --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
    --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
    --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
    --red: #cc3333; --blue: #2266cc;
    --accent: #b8960a;
  }
}
:root[data-theme="light"] {
  --green: #00892e; --green-dim: #006b24;
  --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
  --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
  --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
  --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
  --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
  --red: #cc3333; --blue: #2266cc;
  --accent: #b8960a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(234, 179, 8, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ INDEX GRID ============ */
.index-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.index-card {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: flex;
  flex-direction: column; gap: 12px;
}
.index-card:hover {
  border-color: var(--border-green); background: var(--bg-card-hover);
}
.index-card-top {
  display: flex; justify-content: space-between; align-items: center;
}
.index-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.difficulty-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px;
}
.difficulty-badge.beginner {
  color: var(--green); border: 1px solid rgba(0, 255, 65, 0.3);
  background: rgba(0, 255, 65, 0.06);
}
.difficulty-badge.intermediate {
  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3);
  background: rgba(234, 179, 8, 0.06);
}
.difficulty-badge.advanced {
  color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3);
  background: rgba(255, 68, 68, 0.06);
}
.index-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px;
  font-weight: 700; line-height: 1.3;
}
.index-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.index-card-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============ DETAIL VIEW ============ */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; cursor: pointer;
  transition: color 0.2s; padding: 24px 0 0; border: none;
  background: none;
}
.detail-back:hover { color: var(--green); }
.detail-hero {
  padding: 40px 0 32px; position: relative;
}
.detail-hero::before {
  content: ''; position: absolute; top: -20px; left: 0;
  width: 400px; height: 200px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.detail-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 12px; position: relative;
}
.detail-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(24px, 4vw, 36px);
  font-weight: 700; margin-bottom: 10px; position: relative;
}
.detail-desc {
  color: var(--text-secondary); font-size: 15px;
  max-width: 700px; line-height: 1.7; margin-bottom: 16px; position: relative;
}
.detail-meta-row {
  display: flex; gap: 12px; align-items: center; position: relative;
}

/* ============ DETAIL SECTIONS GRID ============ */
.detail-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.detail-section {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; position: relative;
}
.detail-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}

/* ============ SECTION: OVERVIEW ============ */
.overview-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
  margin-bottom: 20px;
}
.overview-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; margin-top: 16px;
}
.overview-sub:first-of-type { margin-top: 0; }
.prereq-list { list-style: none; padding: 0; }
.prereq-list li {
  font-size: 13px; color: var(--text-secondary);
  padding: 3px 0 3px 16px; position: relative; line-height: 1.5;
}
.prereq-list li::before {
  content: '>'; position: absolute; left: 0;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.build-callout {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  padding: 12px 16px; font-size: 13px; color: var(--text-secondary);
  line-height: 1.6; margin-top: 8px;
}

/* ============ SECTION: MODULES ============ */
.module-list { display: flex; flex-direction: column; gap: 0; }
.module-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.module-item:last-child { border-bottom: none; }
.module-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 18px;
  font-weight: 700; color: var(--accent); min-width: 28px;
  text-align: center;
}
.module-info { flex: 1; }
.module-title {
  font-size: 14px; font-weight: 600; margin-bottom: 2px;
}
.module-meta {
  display: flex; gap: 8px; align-items: center;
}
.module-time {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim);
}
.module-type {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 1px 6px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.module-type.practice { color: var(--green); border-color: rgba(0,255,65,0.2); }
.module-type.project { color: var(--accent); border-color: rgba(234,179,8,0.2); }

/* ============ SECTION: KEY CONCEPTS ============ */
.concept-list { display: flex; flex-direction: column; gap: 16px; }
.concept-item {
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.concept-item:last-child { border-bottom: none; padding-bottom: 0; }
.concept-header {
  display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
}
.concept-step {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 2px 6px; background: rgba(234,179,8,0.08);
  border: 1px solid rgba(234,179,8,0.2); color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.concept-title {
  font-size: 14px; font-weight: 600;
}
.concept-content {
  font-size: 13px; color: var(--text-secondary); line-height: 1.7;
}

/* ============ SECTION: EXERCISE ============ */
.exercise-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 16px;
  font-weight: 700; margin-bottom: 12px;
}
.exercise-instructions {
  font-size: 13px; color: var(--text-secondary); line-height: 1.7;
  margin-bottom: 16px; white-space: pre-wrap;
}
.exercise-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; margin-top: 16px;
}
.exercise-output {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  padding: 12px 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; line-height: 1.6; color: var(--text-secondary);
  white-space: pre-wrap; margin-bottom: 16px;
}
.criteria-list { list-style: none; padding: 0; }
.criteria-list li {
  font-size: 13px; color: var(--text-secondary);
  padding: 4px 0 4px 20px; position: relative; line-height: 1.5;
}
.criteria-list li::before {
  content: '\2713'; position: absolute; left: 0;
  color: var(--green); font-size: 12px;
}
.placeholder-text {
  font-size: 13px; color: var(--text-dim); font-style: italic;
  padding: 20px 0;
}

/* ============ SANDBOX BANNER ============ */
.sandbox-banner {
  background: rgba(0,255,65,0.06); border-bottom: 1px solid rgba(0,255,65,0.15);
  padding: 10px 24px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); display: none;
}
.sandbox-banner.visible { display: block; }
.sandbox-banner a {
  color: var(--green); text-decoration: none; font-weight: 700;
}
.sandbox-banner a:hover { text-decoration: underline; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .index-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .index-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .detail-hero { padding: 32px 0 24px; }
  .detail-meta-row { flex-wrap: wrap; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<script>
// ============ DATA ============
var SKILLS_DATA = [
  {
    id: 'prompt-engineering-fundamentals',
    title: 'Prompt Engineering Fundamentals',
    oneLiner: 'Master the core techniques for writing prompts that produce consistent, production-quality output.',
    category: 'Prompting',
    difficulty: 'Beginner',
    time: '2 hours',
    overview: {
      description: 'This skill covers the foundational techniques every AI practitioner needs — from structuring system prompts to using few-shot examples, chain-of-thought reasoning, and output formatting. By the end, you\'ll write prompts that produce consistent, high-quality output every time.',
      prerequisites: [
        'Basic familiarity with using an AI chatbot (ChatGPT, Claude, etc.)',
        'Understanding of what a "prompt" is and how to submit one',
        'No programming experience required'
      ],
      whatYoullBuild: 'A reusable prompt template library for your 5 most common tasks, each using system prompts, few-shot examples, and structured output formatting.'
    },
    modules: [
      { step: 1, title: 'Anatomy of a Prompt', time: '20 min', type: 'concept' },
      { step: 2, title: 'System Prompts That Work', time: '25 min', type: 'concept' },
      { step: 3, title: 'Few-Shot Examples', time: '20 min', type: 'practice' },
      { step: 4, title: 'Chain-of-Thought Reasoning', time: '25 min', type: 'concept' },
      { step: 5, title: 'Output Formatting & Constraints', time: '15 min', type: 'practice' },
      { step: 6, title: 'Putting It All Together', time: '15 min', type: 'project' }
    ],
    keyConcepts: [
      {
        moduleStep: 1,
        title: 'The Five Elements',
        content: 'Every effective prompt contains five elements: Role (who the AI is), Task (what to do), Context (background information), Constraints (boundaries and rules), and Format (how to structure the output). Missing any one of these leads to inconsistent results. The most common mistake is jumping straight to the task without setting role or constraints.'
      },
      {
        moduleStep: 2,
        title: 'Persistent Behavior',
        content: 'System prompts set the persistent behavior of the model across an entire conversation. Think of them as a personality config — they define expertise, tone, boundaries, and default behaviors. A good system prompt is specific ("You are a senior backend engineer specializing in PostgreSQL optimization") not generic ("You are a helpful assistant").'
      },
      {
        moduleStep: 3,
        title: 'Show, Don\'t Tell',
        content: 'Few-shot examples are the most reliable way to show the model what you want. Instead of describing your desired output format in 200 words, show 2-3 examples. The model pattern-matches against your examples with remarkable accuracy. Start with 2 examples; add a 3rd only if consistency improves. More is not always better — 5+ examples can cause overfitting.'
      },
      {
        moduleStep: 4,
        title: 'Reasoning Steps',
        content: 'Chain-of-thought prompting asks the model to show its work. Adding "think step by step" or "break this down into steps" improves accuracy on complex tasks by 20-40%. For math, logic, and multi-step analysis, this is not optional — it\'s essential. You can also provide a reasoning structure: "First analyze X, then evaluate Y, then conclude Z."'
      },
      {
        moduleStep: 5,
        title: 'Structured Output',
        content: 'Output formatting eliminates post-processing. Instruct the model to return JSON, markdown tables, XML, or any structured format. Use schema constraints when possible — "Return a JSON object with keys: severity (string), description (string), priority (integer 1-5)". For JSON output, adding "Return ONLY valid JSON, no explanation" prevents wrapper text.'
      },
      {
        moduleStep: 6,
        title: 'Production Assembly',
        content: 'A production prompt layers all techniques: system prompt (sets role and expertise) + context injection (provides relevant data) + few-shot examples (demonstrates desired output) + chain-of-thought (ensures reasoning quality) + format constraints (guarantees parseable output). Build and test each layer independently before combining.'
      }
    ],
    exercise: {
      title: 'Build a Code Review Prompt',
      instructions: 'Create a prompt that reviews code and returns structured feedback in JSON format.\n\nYour prompt must include:\n1. A system prompt defining the reviewer\'s expertise and review philosophy\n2. Two few-shot examples (one good code, one problematic code with findings)\n3. Chain-of-thought instruction for explaining each issue\n4. JSON output schema: array of objects with severity, line, issue, and suggestion fields\n\nTest your prompt against a 20-line function of your choice.',
      expectedOutput: 'A valid JSON array with 3-5 findings. Each finding has: severity (critical/warning/info), line (number), issue (string), suggestion (string with code fix).',
      successCriteria: [
        'All findings have valid severity levels (critical, warning, or info)',
        'Line numbers reference actual lines in the submitted code',
        'Suggestions are actionable and include corrected code',
        'JSON is valid and parseable by JSON.parse()',
        'No false positives — each finding identifies a real issue'
      ]
    }
  },
  {
    id: 'rag-pipeline-design',
    title: 'RAG Pipeline Design',
    oneLiner: 'Build retrieval-augmented generation pipelines that ground LLM responses in your own data.',
    category: 'RAG',
    difficulty: 'Intermediate',
    time: '4 hours',
    overview: {
      description: 'Learn to build retrieval-augmented generation pipelines that ground LLM responses in your own data. Covers the full stack from document ingestion and chunking strategies to embedding models, vector stores, retrieval methods, and answer synthesis with source citations.',
      prerequisites: [
        'Basic Python proficiency (functions, loops, dictionaries)',
        'Familiarity with REST APIs and API keys',
        'Conceptual understanding of what embeddings are'
      ],
      whatYoullBuild: 'A working RAG pipeline that answers natural language questions from a document corpus, with source citations and relevance scoring.'
    },
    modules: [
      { step: 1, title: 'RAG Architecture Overview', time: '15 min', type: 'concept' },
      { step: 2, title: 'Document Chunking Strategies', time: '25 min', type: 'concept' },
      { step: 3, title: 'Embedding Models & Vector Stores', time: '30 min', type: 'concept' },
      { step: 4, title: 'Retrieval Methods', time: '25 min', type: 'practice' },
      { step: 5, title: 'Answer Synthesis & Grounding', time: '20 min', type: 'concept' },
      { step: 6, title: 'Evaluation & Iteration', time: '25 min', type: 'project' }
    ],

// ============ STATE ============
var activeFilter = 'all';

// ============ HELPERS ============
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function findById(id) {
  for (var i = 0; i < SKILLS_DATA.length; i++) {
    if (SKILLS_DATA[i].id === id) return SKILLS_DATA[i];
  }
  return null;
}

function getFiltered() {
  if (activeFilter === 'all') return SKILLS_DATA;
  return SKILLS_DATA.filter(function(s) { return s.category === activeFilter; });
}

// ============ ROUTING ============
function route() {
  var hash = window.location.hash.slice(1);
  var item = hash ? findById(hash) : null;
  if (item) {
    showDetail(item);
  } else {
    showIndex();
  }
}

function showIndex() {
  document.getElementById('indexView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  document.title = 'Skills \u2014 AIOpsForge';
  renderStats();
  renderFilters();
  renderGrid();
  window.scrollTo(0, 0);
}

function showDetail(item) {
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.title = item.title + ' \u2014 AIOpsForge Skills';
  renderDetailHeader(item);
  renderDetailSections(item);
  window.scrollTo(0, 0);
}

function goBack() {
  history.pushState('', '', window.location.pathname);
  showIndex();
}

// ============ INDEX RENDERING ============
function renderStats() {
  var cats = {};
  SKILLS_DATA.forEach(function(s) { cats[s.category] = true; });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + SKILLS_DATA.length + '</span><span class="stat-label">skills</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(cats).length + '</span><span class="stat-label">categories</span></div>';
}

function renderFilters() {
  var cats = {};
  SKILLS_DATA.forEach(function(s) { cats[s.category] = (cats[s.category] || 0) + 1; });
  var html = '<button class="filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(cats).forEach(function(c) {
    html += '<button class="filter-btn' + (activeFilter === c ? ' active' : '') + '" onclick="setFilter(\'' + c + '\', this)">' + c + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function renderGrid() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(s) {
    var diffClass = s.difficulty.toLowerCase();
    html += '<a class="index-card" href="#' + s.id + '">' +
      '<div class="index-card-top">' +
        '<span class="index-card-tag">' + escapeHtml(s.category) + '</span>' +
        '<span class="difficulty-badge ' + diffClass + '">' + escapeHtml(s.difficulty) + '</span>' +
      '</div>' +
      '<h3 class="index-card-title">' + escapeHtml(s.title) + '</h3>' +
      '<p class="index-card-desc">' + escapeHtml(s.oneLiner) + '</p>' +
      '<span class="index-card-meta">' + escapeHtml(s.time) + ' &middot; ' + (s.modules ? s.modules.length : 0) + ' modules</span>' +
    '</a>';
  });
  if (filtered.length === 0) {
    html = '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center; padding:40px 0;">No skills in this category yet.</p>';
  }
  document.getElementById('indexGrid').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// ============ DETAIL RENDERING ============
function renderDetailHeader(item) {
  var diffClass = item.difficulty.toLowerCase();
  document.getElementById('detailHeader').innerHTML =
    '<button class="detail-back" onclick="goBack()">&larr; back to all skills</button>' +
    '<div class="detail-hero">' +
      '<div class="detail-tag">' + escapeHtml(item.category) + '</div>' +
      '<h1 class="detail-title">' + escapeHtml(item.title) + '</h1>' +
      '<p class="detail-desc">' + escapeHtml(item.oneLiner) + '</p>' +
      '<div class="detail-meta-row">' +
        '<span class="difficulty-badge ' + diffClass + '">' + escapeHtml(item.difficulty) + '</span>' +
        '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--text-dim)">' + escapeHtml(item.time) + '</span>' +
      '</div>' +
    '</div>';
}

function renderDetailSections(item) {
  var html = '';

  // Section 1: OVERVIEW
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">overview</span></div>';
  if (item.overview) {
    html += '<div class="overview-desc">' + escapeHtml(item.overview.description) + '</div>';
    if (item.overview.prerequisites && item.overview.prerequisites.length > 0) {
      html += '<div class="overview-sub">prerequisites</div><ul class="prereq-list">';
      item.overview.prerequisites.forEach(function(p) {
        html += '<li>' + escapeHtml(p) + '</li>';
      });
      html += '</ul>';
    }
    if (item.overview.whatYoullBuild) {
      html += '<div class="overview-sub">what you\'ll build</div>' +
        '<div class="build-callout">' + escapeHtml(item.overview.whatYoullBuild) + '</div>';
    }
  }
  html += '</div>';

  // Section 2: MODULE BREAKDOWN
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">module breakdown</span></div>';
  if (item.modules && item.modules.length > 0) {
    html += '<div class="module-list">';
    item.modules.forEach(function(m) {
      var typeClass = m.type === 'practice' ? ' practice' : (m.type === 'project' ? ' project' : '');
      html += '<div class="module-item">' +
        '<span class="module-num">' + m.step + '</span>' +
        '<div class="module-info">' +
          '<div class="module-title">' + escapeHtml(m.title) + '</div>' +
          '<div class="module-meta">' +
            '<span class="module-time">' + escapeHtml(m.time) + '</span>' +
            '<span class="module-type' + typeClass + '">' + escapeHtml(m.type) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Section 3: KEY CONCEPTS
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">key concepts</span></div>';
  if (item.keyConcepts && item.keyConcepts.length > 0) {
    html += '<div class="concept-list">';
    item.keyConcepts.forEach(function(c) {
      html += '<div class="concept-item">' +
        '<div class="concept-header">' +
          '<span class="concept-step">module ' + c.moduleStep + '</span>' +
          '<span class="concept-title">' + escapeHtml(c.title) + '</span>' +
        '</div>' +
        '<div class="concept-content">' + escapeHtml(c.content) + '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="placeholder-text">Key concepts will be added as this skill is developed.</p>';
  }
  html += '</div>';

  // Section 4: PRACTICE EXERCISE
  html += '<div class="detail-section">' +
    '<div class="section-header"><span class="section-label">practice exercise</span></div>';
  if (item.exercise) {
    html += '<div class="exercise-title">' + escapeHtml(item.exercise.title) + '</div>' +
      '<div class="exercise-instructions">' + escapeHtml(item.exercise.instructions) + '</div>';
    if (item.exercise.expectedOutput) {
      html += '<div class="exercise-sub">expected output</div>' +
        '<div class="exercise-output">' + escapeHtml(item.exercise.expectedOutput) + '</div>';
    }
    if (item.exercise.successCriteria && item.exercise.successCriteria.length > 0) {
      html += '<div class="exercise-sub">success criteria</div>' +
        '<ul class="criteria-list">';
      item.exercise.successCriteria.forEach(function(c) {
        html += '<li>' + escapeHtml(c) + '</li>';
      });
      html += '</ul>';
    }
  } else {
    html += '<p class="placeholder-text">Exercise coming soon.</p>';
  }
  html += '</div>';

  document.getElementById('detailGrid').innerHTML = html;
}

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();

  document.getElementById('sandboxBanner').classList.add('visible');
  document.getElementById('hubLink').href = '/sandbox/';
  document.getElementById('hubLink').innerHTML = '&larr; back to sandbox';
}

window.addEventListener('hashchange', route);
route();
