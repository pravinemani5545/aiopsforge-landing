<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/design-system/tokens.css">
<style>
:root {
  --accent: #eab308;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 256px 256px;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.page-header::after {
  content: ''; position: absolute; inset: -100px -20vw 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 45% 40%, rgba(234,179,8,0.10) 0%, transparent 45%),
              radial-gradient(ellipse at 50% 60%, var(--green-glow) 0%, transparent 50%);
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative; z-index: 1;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative; z-index: 1;
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative; z-index: 1;
}

/* ============ FADING DIVIDER ============ */
.section-divider {
  border: none; height: 1px; margin: 0;
  background: linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--border) 80%, transparent 100%);
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(234, 179, 8, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ INDEX GRID ============ */
.index-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.index-card {
  --card-glow-size: 190px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: flex;
  flex-direction: column; gap: 12px; position: relative; overflow: hidden;
}
.index-card::before {
  content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 0;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(234, 179, 8, 0.09), transparent 55%);
}
.index-card:hover::before { opacity: 1; }
.index-card:hover {
  border-color: rgba(234, 179, 8, 0.24); background: var(--bg-card-hover);
}
.index-card > * { position: relative; z-index: 1; }
.index-card-top {
  display: flex; justify-content: space-between; align-items: center;
}
.index-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.difficulty-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px;
}
.difficulty-badge.beginner {
  color: var(--green); border: 1px solid rgba(0, 255, 65, 0.3);
  background: rgba(0, 255, 65, 0.06);
}
.difficulty-badge.intermediate {
  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3);
  background: rgba(234, 179, 8, 0.06);
}
.difficulty-badge.advanced {
  color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3);
  background: rgba(255, 68, 68, 0.06);
}
.index-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px;
  font-weight: 700; line-height: 1.3;
}
.index-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.index-card-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============ DETAIL VIEW ============ */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; cursor: pointer;
  transition: color 0.2s; padding: 24px 0 0; border: none;
  background: none;
}
.detail-back:hover { color: var(--green); }
.detail-hero {
  padding: 40px 0 32px; position: relative;
}
.detail-hero::before {
  content: ''; position: absolute; inset: -80px -20vw 0;
  pointer-events: none;
  background: radial-gradient(ellipse at 25% 35%, rgba(234,179,8,0.08) 0%, transparent 45%),
              radial-gradient(ellipse at 35% 55%, var(--green-glow) 0%, transparent 50%);
}
.detail-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 12px; position: relative;
}
.detail-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(24px, 4vw, 36px);
  font-weight: 700; margin-bottom: 10px; position: relative;
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.detail-desc {
  color: var(--text-secondary); font-size: 15px;
  max-width: 700px; line-height: 1.7; margin-bottom: 16px; position: relative;
}
.detail-meta-row {
  display: flex; gap: 12px; align-items: center; position: relative;
}

/* ============ DETAIL SECTIONS (VERTICAL STACK) ============ */
.detail-sections {
  display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px;
}
.detail-section {
  --card-glow-size: 56px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; position: relative;
  overflow: hidden; transition: border-color 0.2s, background 0.2s;
}
.detail-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.detail-section::after {
  content: ''; position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(234,179,8,0.04) 0%, transparent 42%);
}
.detail-section:hover { border-color: rgba(234, 179, 8, 0.22); background: var(--bg-card-hover); }
.detail-section:hover::after { opacity: 0.7; }
.detail-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}

/* ============ SECTION: OVERVIEW ============ */
.overview-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
  margin-bottom: 20px;
}
.learn-list { list-style: none; padding: 0; }
.learn-list li {
  padding: 8px 0; padding-left: 24px; position: relative;
  font-size: 14px; color: var(--text-secondary);
}
.learn-list li::before {
  content: '\2192'; position: absolute; left: 0;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
}
.learn-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; margin-top: 16px;
}

/* ============ SECTION: PREREQUISITES ============ */
.prereq-box {
  padding: 24px; background: var(--bg-card); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); position: relative;
}
.prereq-box::before {
  content: ''; position: absolute; top: 0; left: -3px; right: 0;
  height: 2px; background: var(--accent);
}
.prereq-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px;
}
.prereq-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
}
.prereq-item-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 4px;
}
.prereq-item-value {
  font-size: 14px; color: var(--text-secondary); line-height: 1.6;
}
.prereq-list { list-style: none; padding: 0; margin-top: 16px; }
.prereq-list li {
  font-size: 13px; color: var(--text-secondary);
  padding: 3px 0 3px 16px; position: relative; line-height: 1.5;
}
.prereq-list li::before {
  content: '>'; position: absolute; left: 0;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* ============ SECTION: MODULE BREAKDOWN (TIMELINE) ============ */
.timeline { position: relative; padding-left: 48px; }
.timeline::before {
  content: ''; position: absolute; left: 15px; top: 24px; bottom: 24px; width: 1px;
  background: linear-gradient(180deg, var(--accent) 0%, var(--border) 30%, var(--border) 70%, transparent 100%);
}
.timeline-item {
  --card-glow-size: 52px;
  position: relative; padding: 16px 12px 16px 0; border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.timeline-item:last-child { border-bottom: none; }
.timeline-item::after {
  content: ''; position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(234,179,8,0.034) 0%, transparent 40%);
}
.timeline-item:hover::after { opacity: 0.62; }
.timeline-num {
  position: absolute; left: -48px; top: 16px; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
  color: var(--accent); border: 1px solid var(--border-green); background: var(--bg-primary);
}
.timeline-title {
  font-size: 14px; font-weight: 600; margin-bottom: 4px;
}
.timeline-meta {
  display: flex; gap: 8px; align-items: center;
}
.timeline-time {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim);
}
.timeline-type {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 1px 6px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.timeline-type.practice { color: var(--green); border-color: rgba(0,255,65,0.2); }
.timeline-type.project { color: var(--accent); border-color: rgba(234,179,8,0.2); }

/* ============ SECTION: KEY CONCEPTS (DEEP DIVE) ============ */
.concept-list { display: flex; flex-direction: column; gap: 0; }
.concept-item {
  padding: 20px 0; border-bottom: 1px solid var(--border);
}
.concept-item:last-child { border-bottom: none; }
.concept-item:first-child { padding-top: 0; }
.concept-header {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.concept-step {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 2px 6px; background: rgba(234,179,8,0.08);
  border: 1px solid rgba(234,179,8,0.2); color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
}
.concept-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
}
.concept-content {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
}

/* ============ SECTION: EXERCISE ============ */
.exercise-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 16px;
  font-weight: 700; margin-bottom: 12px;
}
.exercise-instructions {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
  margin-bottom: 16px; white-space: pre-wrap;
}
.exercise-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; margin-top: 16px;
}
.exercise-output {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  padding: 12px 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; line-height: 1.6; color: var(--text-secondary);
  white-space: pre-wrap; margin-bottom: 16px;
}
.criteria-list { list-style: none; padding: 0; }
.criteria-list li {
  font-size: 13px; color: var(--text-secondary);
  padding: 4px 0 4px 20px; position: relative; line-height: 1.5;
}
.criteria-list li::before {
  content: '\2713'; position: absolute; left: 0;
  color: var(--green); font-size: 12px;
}

/* ============ SECTION: COMMON PITFALLS ============ */
.pitfall-list { display: flex; flex-direction: column; gap: 0; }
.pitfall-item {
  padding: 16px 0; border-bottom: 1px solid var(--border);
}
.pitfall-item:last-child { border-bottom: none; }
.pitfall-item:first-child { padding-top: 0; }
.pitfall-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
}
.pitfall-label.bad { color: var(--red); }
.pitfall-label.good { color: var(--green); }
.pitfall-text {
  font-size: 14px; color: var(--text-secondary); line-height: 1.6;
}

/* ============ SECTION: FURTHER LEARNING ============ */
.resource-list { display: flex; flex-direction: column; gap: 12px; }
.resource-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border); transition: all 0.2s;
}
.resource-item:hover { border-color: var(--border-green); }
.resource-type {
  font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase;
  padding: 2px 8px; border: 1px solid var(--border); color: var(--text-dim); flex-shrink: 0;
}
.resource-info { flex: 1; }
.resource-title {
  font-size: 14px; font-weight: 600; margin-bottom: 2px;
}
.resource-desc {
  font-size: 12px; color: var(--text-dim); line-height: 1.5;
}

/* ============ SANDBOX BANNER ============ */
.sandbox-banner {
  background: rgba(0,255,65,0.06); border-bottom: 1px solid rgba(0,255,65,0.15);
  padding: 10px 24px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); display: none;
}
.sandbox-banner.visible { display: block; }
.sandbox-banner a {
  color: var(--green); text-decoration: none; font-weight: 700;
}
.sandbox-banner a:hover { text-decoration: underline; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

.placeholder-text {
  font-size: 13px; color: var(--text-dim); font-style: italic;
  padding: 20px 0;
}

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .index-grid { grid-template-columns: repeat(2, 1fr); }
  .prereq-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  .detail-row { grid-template-columns: 1fr; }
  .prereq-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .index-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .detail-hero { padding: 32px 0 24px; }
  .detail-meta-row { flex-wrap: wrap; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<script>
var SANDBOX_MODE = sessionStorage.getItem('aof_sandbox') === '1';
if (!SANDBOX_MODE && sessionStorage.getItem('aof_cw_auth') !== '1') { window.location.href = '/community/index.html'; }
</script>
<div class="scroll-progress" id="scrollProgress"></div>
<div class="sandbox-banner" id="sandboxBanner">Viewing free preview &mdash; <a href="https://whop.com/ai-ops-forge/">Join the community</a> for the full library</div>
<button class="floating-theme-toggle" id="floatingThemeToggle">&#9728;</button>
<div class="container">
  <a href="/community/index.html" class="back-link" id="hubLink">&larr; back to hub</a>

  <!-- INDEX VIEW -->
  <div id="indexView">
    <div class="page-header">
      <div class="page-label">skills</div>
      <h1 class="page-title">Skills</h1>
      <p class="page-subtitle">Individual AI skill modules. Master one capability at a time — prompting, RAG, fine-tuning, evaluation.</p>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="index-grid" id="indexGrid"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" style="display:none">
    <div id="detailHeader"></div>
    <div class="detail-sections" id="detailSections"></div>
  </div>
</div>
<footer class="footer">
  <div class="footer-inner">
    <span style="font-family: 'JetBrains Mono', monospace;">AIOpsForge &middot; Community Workspace</span>
    <div class="footer-links">
      <a href="/community/index.html">Hub</a>
      <a href="../index.html">Home</a>
    </div>
    <span>built by an engineer who ships</span>
  </div>
</footer>
<script>
// ============ DATA ============
var SKILLS_DATA = [
  {
    id: 'prompt-engineering-fundamentals',
    title: 'Prompt Engineering Fundamentals',
    oneLiner: 'Master the core techniques for writing prompts that produce consistent, production-quality output.',
    category: 'Prompting',
    difficulty: 'Beginner',
    time: '2 hours',
    overview: {
      description: 'This skill covers the foundational techniques every AI practitioner needs — from structuring system prompts to using few-shot examples, chain-of-thought reasoning, and output formatting. By the end, you\'ll write prompts that produce consistent, high-quality output every time.',
      prerequisites: [
        'Basic familiarity with using an AI chatbot (ChatGPT, Claude, etc.)',
        'Understanding of what a "prompt" is and how to submit one',

// ============ STATE ============
var activeFilter = 'all';

// ============ HELPERS ============
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function findById(id) {
  for (var i = 0; i < SKILLS_DATA.length; i++) {
    if (SKILLS_DATA[i].id === id) return SKILLS_DATA[i];
  }
  return null;
}

function getFiltered() {
  if (activeFilter === 'all') return SKILLS_DATA;
  return SKILLS_DATA.filter(function(s) { return s.category === activeFilter; });
}

// ============ ROUTING ============
function route() {
  var hash = window.location.hash.slice(1);
  var item = hash ? findById(hash) : null;
  if (item) {
    showDetail(item);
  } else {
    showIndex();
  }
}

function showIndex() {
  document.getElementById('indexView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  document.title = 'Skills \u2014 AIOpsForge';
  renderStats();
  renderFilters();
  renderGrid();
  window.scrollTo(0, 0);
}

function showDetail(item) {
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.title = item.title + ' \u2014 AIOpsForge Skills';
  renderDetailHeader(item);
  renderDetailSections(item);
  window.scrollTo(0, 0);
}

function goBack() {
  history.pushState('', '', window.location.pathname);
  showIndex();
}

// ============ INDEX RENDERING ============
function renderStats() {
  var cats = {};
  SKILLS_DATA.forEach(function(s) { cats[s.category] = true; });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + SKILLS_DATA.length + '</span><span class="stat-label">skills</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(cats).length + '</span><span class="stat-label">categories</span></div>';
}

function renderFilters() {
  var cats = {};
  SKILLS_DATA.forEach(function(s) { cats[s.category] = (cats[s.category] || 0) + 1; });
  var html = '<button class="filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(cats).forEach(function(c) {
    html += '<button class="filter-btn' + (activeFilter === c ? ' active' : '') + '" onclick="setFilter(\'' + c + '\', this)">' + c + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function renderGrid() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(s) {
    var diffClass = s.difficulty.toLowerCase();
    html += '<a class="index-card" href="#' + s.id + '">' +
      '<div class="index-card-top">' +
        '<span class="index-card-tag">' + escapeHtml(s.category) + '</span>' +
        '<span class="difficulty-badge ' + diffClass + '">' + escapeHtml(s.difficulty) + '</span>' +
      '</div>' +
      '<h3 class="index-card-title">' + escapeHtml(s.title) + '</h3>' +
      '<p class="index-card-desc">' + escapeHtml(s.oneLiner) + '</p>' +
      '<span class="index-card-meta">' + escapeHtml(s.time) + ' &middot; ' + (s.modules ? s.modules.length : 0) + ' modules</span>' +
    '</a>';
  });
  if (filtered.length === 0) {
    html = '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center; padding:40px 0;">No skills in this category yet.</p>';
  }
  document.getElementById('indexGrid').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// ============ DETAIL RENDERING ============

  html += '</div>';

  // ---- Section 4: DEEP DIVE: KEY CONCEPTS ----

  if (item.keyConcepts && item.keyConcepts.length > 0) {

    html += '<p class="placeholder-text">Key concepts will be added as this skill is developed.</p>';
  }

  html += '<div class="detail-section">' +

  if (item.exercise) {
    html += '<div class="exercise-title">' + escapeHtml(item.exercise.title) + '</div>' +

    if (item.exercise.expectedOutput) {
      html += '<div class="exercise-sub">expected output</div>' +
        '<div class="exercise-output">' + escapeHtml(item.exercise.expectedOutput) + '</div>';
    }

        '</div>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="placeholder-text">Resources will be added as this skill is developed.</p>';
  }
  html += '</div>';

  document.getElementById('detailSections').innerHTML = html;

// ============ CURSOR-TRACKING GLOW ON CARDS ============
(function() {
  document.addEventListener('mousemove', function(e) {
    var cards = document.querySelectorAll('.index-card, .detail-section, .timeline-item');
    cards.forEach(function(card) {
      var rect = card.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      card.style.setProperty('--mouse-x', x + 'px');
      card.style.setProperty('--mouse-y', y + 'px');
    });
  });
})();

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();
