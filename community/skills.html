<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00FF41; --green-dim: #00cc34;
  --green-glow: rgba(0, 255, 65, 0.15); --green-glow-strong: rgba(0, 255, 65, 0.3);
  --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #161616;
  --bg-card: #1a1a1a; --bg-card-hover: #222222;
  --border: #2a2a2a; --border-green: rgba(0, 255, 65, 0.2);
  --text-primary: #f0f0f0; --text-secondary: #999999; --text-dim: #666666;
  --red: #ff4444; --blue: #4488ff;
  --accent: #eab308;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --green: #00892e; --green-dim: #006b24;
    --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
    --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
    --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
    --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
    --red: #cc3333; --blue: #2266cc;
    --accent: #b8960a;
  }
}
:root[data-theme="light"] {
  --green: #00892e; --green-dim: #006b24;
  --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
  --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
  --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
  --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
  --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
  --red: #cc3333; --blue: #2266cc;
  --accent: #b8960a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(234, 179, 8, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ SKILLS GRID ============ */
.cards-container { padding-bottom: 60px; }
.skills-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
}
.skill-card {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; transition: border-color 0.2s;
  display: flex; flex-direction: column;
}
.skill-card:hover { border-color: var(--border-green); }
.skill-tags { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
.tag-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 2px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
}
.skill-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 18px;
  font-weight: 700; margin-bottom: 6px;
}
.skill-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  margin-bottom: 16px;
}
.skill-learnings {
  list-style: none; margin: 0 0 auto; padding: 0;
}
.skill-learnings li {
  font-size: 13px; color: var(--text-secondary);
  padding: 4px 0 4px 16px; position: relative; line-height: 1.5;
}
.skill-learnings li::before {
  content: '>'; position: absolute; left: 0;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.skill-meta {
  display: flex; align-items: center; gap: 12px;
  margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.difficulty-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px;
}
.difficulty-badge.beginner {
  color: var(--green); border: 1px solid rgba(0, 255, 65, 0.3);
  background: rgba(0, 255, 65, 0.06);
}
.difficulty-badge.intermediate {
  color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3);
  background: rgba(234, 179, 8, 0.06);
}
.difficulty-badge.advanced {
  color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3);
  background: rgba(255, 68, 68, 0.06);
}
.skill-time {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim);
}
.action-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: transparent; border: 1px solid rgba(234, 179, 8, 0.4);
  color: var(--accent); cursor: pointer; transition: all 0.2s;
  text-decoration: none; margin-left: auto;
}
.action-btn:hover { background: rgba(234, 179, 8, 0.08); }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 700px) {
  .skills-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .skill-meta { flex-direction: column; align-items: flex-start; }
  .action-btn { margin-left: 0; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<script>
if (sessionStorage.getItem('aof_cw_auth') !== '1') { window.location.href = '/community/'; }
</script>
<div class="scroll-progress" id="scrollProgress"></div>
<button class="floating-theme-toggle" id="floatingThemeToggle">&#9728;</button>
<div class="container">
  <a href="/community/" class="back-link">&larr; back to hub</a>
  <div class="page-header">
    <div class="page-label">skills</div>
    <h1 class="page-title">Skills</h1>
    <p class="page-subtitle">Individual AI skill modules. Master one capability at a time — prompting, RAG, fine-tuning, evaluation.</p>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="cards-container" id="cardsContainer"></div>
</div>
<footer class="footer">
  <div class="footer-inner">
    <span style="font-family: 'JetBrains Mono', monospace;">AIOpsForge &middot; Community Workspace</span>
    <div class="footer-links">
      <a href="/community/">Hub</a>
      <a href="../index.html">Home</a>
    </div>
    <span>built by an engineer who ships</span>
  </div>
</footer>
<script>
// ============ DATA ============
var SKILLS_DATA = [
  {
    title: 'Prompt Engineering Fundamentals',
    description: 'Master the core techniques for writing effective prompts — system prompts, few-shot examples, chain-of-thought, and output formatting.',
    learnings: [
      'Write system prompts that produce consistent, high-quality output',
      'Use few-shot examples to steer model behavior without fine-tuning',
      'Apply chain-of-thought reasoning for complex multi-step tasks',
      'Structure output with JSON, markdown, and schema constraints'
    ],
    difficulty: 'Beginner',
    time: '2 hours',
    downloadUrl: '#',
    tags: ['Prompting']
  },
  {
    title: 'RAG Pipeline Design',
    description: 'Build retrieval-augmented generation pipelines that ground LLM responses in your own data — from chunking to retrieval to synthesis.',
    learnings: [
      'Chunk documents effectively for different content types',
      'Choose the right embedding model for your domain',
      'Implement hybrid search combining vector and keyword retrieval',
      'Evaluate retrieval quality with precision, recall, and MRR metrics'
    ],
    difficulty: 'Intermediate',
    time: '4 hours',
    downloadUrl: '#',
    tags: ['RAG']
  },
  {
    title: 'LLM Output Evaluation',
    description: 'Build automated evaluation harnesses that catch hallucinations, measure quality, and compare prompt variants at scale.',
    learnings: [
      'Design scoring rubrics for subjective output quality',
      'Build automated eval pipelines with LLM-as-judge patterns',
      'Detect hallucinations programmatically using reference grounding',
      'A/B test prompt variants with statistical significance'
    ],
    difficulty: 'Advanced',
    time: '3 hours',
    downloadUrl: '#',
    tags: ['Evaluation']
  }
];

// ============ STATE ============
var activeFilter = 'all';

// ============ RENDER ============
function renderStats() {
  var tags = {};
  SKILLS_DATA.forEach(function(s) {
    s.tags.forEach(function(t) { tags[t] = true; });
  });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + SKILLS_DATA.length + '</span><span class="stat-label">skills</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(tags).length + '</span><span class="stat-label">topics</span></div>';
}

function renderFilters() {
  var tags = {};
  SKILLS_DATA.forEach(function(s) {
    s.tags.forEach(function(t) { tags[t] = (tags[t] || 0) + 1; });
  });
  var html = '<button class="filter-btn active" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(tags).forEach(function(t) {
    html += '<button class="filter-btn" onclick="setFilter(\'' + t + '\', this)">' + t + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function getFiltered() {
  if (activeFilter === 'all') return SKILLS_DATA;
  return SKILLS_DATA.filter(function(s) { return s.tags.indexOf(activeFilter) !== -1; });
}

function renderCards() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(s) {
    var tagHtml = '';
    s.tags.forEach(function(t) { tagHtml += '<span class="tag-badge">' + t + '</span>'; });

    var learnHtml = '<ul class="skill-learnings">';
    s.learnings.forEach(function(l) { learnHtml += '<li>' + l + '</li>'; });
    learnHtml += '</ul>';

    var diffClass = s.difficulty.toLowerCase();

    html += '<div class="skill-card">' +
      '<div class="skill-tags">' + tagHtml + '</div>' +
      '<h3 class="skill-title">' + s.title + '</h3>' +
      '<p class="skill-desc">' + s.description + '</p>' +
      learnHtml +
      '<div class="skill-meta">' +
        '<span class="difficulty-badge ' + diffClass + '">' + s.difficulty + '</span>' +
        '<span class="skill-time">' + s.time + '</span>' +
        '<a href="' + s.downloadUrl + '" class="action-btn">Download Skill</a>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('cardsContainer').innerHTML = '<div class="skills-grid">' + html + '</div>';
}

// ============ INTERACTIONS ============
function setFilter(tag, btn) {
  activeFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderCards();
}

// ============ INIT ============
renderStats();
renderFilters();
renderCards();

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();
</script>
</body>
</html>
