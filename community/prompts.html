<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompts — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/design-system/tokens.css">
<style>
:root {
  --accent: #10b981;
}
:root[data-theme="light"] {
  --accent: #059669;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --accent: #059669;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 256px 256px;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }

/* ============ PAGE HEADER ============ */
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; inset: -100px -20vw 0;
  background:
    radial-gradient(ellipse at 45% 40%, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0.02) 35%, transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(0,255,65,0.04) 0%, transparent 45%);
  pointer-events: none;
}
.page-header .dot-bg {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative;
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(16, 185, 129, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ INDEX GRID ============ */
.index-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.index-card {
  --card-glow-size: 180px;
  position: relative; overflow: hidden;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: flex;
  flex-direction: column; gap: 12px;
}
.index-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(16,185,129,0.09) 0%, transparent 55%);
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.index-card:hover::before { opacity: 1; }
.index-card:hover {
  border-color: rgba(16, 185, 129, 0.24); background: var(--bg-card-hover);
}
.index-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
  display: inline-block; align-self: flex-start;
}
.index-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px;
  font-weight: 700; line-height: 1.3;
}
.index-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.index-card-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============ DETAIL VIEW ============ */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; cursor: pointer;
  transition: color 0.2s; padding: 24px 0 0; border: none;
  background: none;
}
.detail-back:hover { color: var(--green); }
.detail-hero {
  padding: 40px 0 32px; position: relative;
}
.detail-hero .dot-bg {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.detail-hero::before {
  content: ''; position: absolute; inset: -60px -20vw 0;
  background: radial-gradient(ellipse at 20% 40%, var(--green-glow) 0%, transparent 45%);
  pointer-events: none;
}
.detail-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 12px; position: relative;
}
.detail-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(24px, 4vw, 36px);
  font-weight: 700; margin-bottom: 10px; position: relative;
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.detail-desc {
  color: var(--text-secondary); font-size: 15px;
  max-width: 700px; line-height: 1.7; margin-bottom: 16px; position: relative;
}
.detail-model {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); border: 1px solid var(--border);
  padding: 4px 12px; display: inline-block; background: var(--bg-tertiary);
  position: relative;
}

/* ============ DETAIL SECTIONS — STACKED LAYOUT ============ */
.detail-sections {
  display: flex; flex-direction: column; gap: 24px; padding-bottom: 60px;
}
.detail-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.detail-section {
  --card-glow-size: 56px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; position: relative;
  overflow: hidden; transition: border-color 0.2s, background 0.2s;
}
.detail-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.detail-section::after {
  content: ''; position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(16,185,129,0.038) 0%, transparent 42%);
}
.detail-section:hover { border-color: rgba(16, 185, 129, 0.2); background: var(--bg-card-hover); }
.detail-section:hover::after { opacity: 0.7; }
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}

/* ============ SECTION DIVIDER ============ */
.section-divider {
  border: none; height: 1px; margin: 0;
  background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
}

/* ============ TERMINAL BLOCK ============ */
.terminal-block { position: relative; background: var(--bg-secondary); border: 1px solid var(--border); overflow: hidden; }
.terminal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
}
.terminal-body {
  padding: 20px 24px; font-family: 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.7; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word; max-height: 500px; overflow-y: auto;
}
.terminal-body::-webkit-scrollbar { width: 6px; }
.terminal-body::-webkit-scrollbar-track { background: var(--bg-secondary); }
.terminal-body::-webkit-scrollbar-thumb { background: var(--border); }

/* ============ COPY BUTTON ============ */
.copy-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; padding: 5px 12px; cursor: pointer;
  background: transparent; border: 1px solid rgba(16, 185, 129, 0.4);
  color: var(--accent); transition: all 0.2s;
}
.copy-btn:hover { background: rgba(16, 185, 129, 0.08); }
.copy-btn.copied { background: rgba(16, 185, 129, 0.12); border-color: var(--accent); }

/* ============ PROSE / HOW IT WORKS ============ */
.prose-section { padding: 24px; background: var(--bg-card); border: 1px solid var(--border); }
.prose-section p { font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 16px; }
.prose-section p:last-child { margin-bottom: 0; }

/* ============ VARIABLES ============ */
.var-list { display: flex; flex-direction: column; gap: 16px; }
.var-item {
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.var-item:last-child { border-bottom: none; padding-bottom: 0; }
.var-name {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--accent); margin-bottom: 4px; font-weight: 700;
}
.var-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}
.var-example {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); margin-top: 6px;
  padding: 4px 8px; background: var(--bg-tertiary);
  border: 1px solid var(--border); display: inline-block;
}

/* ============ REQUIREMENTS PANEL ============ */
.req-grid { display: flex; flex-direction: column; gap: 12px; }
.req-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.req-row:last-child { border-bottom: none; }
.req-key { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.req-val { font-size: 13px; color: var(--text-secondary); text-align: right; max-width: 60%; }

/* ============ EXAMPLE OUTPUT ============ */
.example-toggle {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; padding: 5px 12px; cursor: pointer;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); transition: all 0.2s;
}
.example-toggle:hover { border-color: var(--border-green); color: var(--text-primary); }
.example-content {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  padding: 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; line-height: 1.7; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word;
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
}
.example-content.expanded { max-height: 800px; overflow-y: auto; }
.example-content::-webkit-scrollbar { width: 6px; }
.example-content::-webkit-scrollbar-track { background: var(--bg-tertiary); }
.example-content::-webkit-scrollbar-thumb { background: var(--border); }
.example-placeholder {
  font-size: 13px; color: var(--text-dim); font-style: italic;
  padding: 20px 0;
}

/* ============ PRO TIPS ============ */
.tips-list { display: flex; flex-direction: column; gap: 14px; }
.tip-item { display: flex; gap: 12px; align-items: flex-start; }
.tip-num {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 700; color: var(--accent); min-width: 20px;
  line-height: 1.6;
}
.tip-text {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}

/* ============ COMMON MISTAKES ============ */
.mistakes-list { display: flex; flex-direction: column; }
.mistake-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
.mistake-item:last-child { border-bottom: none; }
.mistake-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.mistake-label.bad { color: var(--red); }
.mistake-label.good { color: var(--green); }
.mistake-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

/* ============ RELATED PROMPTS ============ */
.related-strip { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
.related-strip::-webkit-scrollbar { height: 4px; }
.related-strip::-webkit-scrollbar-track { background: var(--bg-card); }
.related-strip::-webkit-scrollbar-thumb { background: var(--border); }
.related-card {
  --card-glow-size: 52px;
  flex: 0 0 280px; background: var(--bg-card); border: 1px solid var(--border);
  padding: 16px; text-decoration: none; color: inherit; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.related-card::after {
  content: ''; position: absolute; inset: 0; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  background: radial-gradient(var(--card-glow-size) circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(16,185,129,0.032) 0%, transparent 40%);
}
.related-card:hover { border-color: rgba(16, 185, 129, 0.24); background: var(--bg-card-hover); }
.related-card:hover::after { opacity: 0.62; }
.related-card > * { position: relative; z-index: 1; }
.related-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim);
  margin-bottom: 8px; display: block;
}
.related-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 14px;
  font-weight: 700; margin-bottom: 6px;
}
.related-card-desc {
  font-size: 12px; color: var(--text-secondary); line-height: 1.5;
}

/* ============ SANDBOX BANNER ============ */
.sandbox-banner {
  background: rgba(0,255,65,0.06); border-bottom: 1px solid rgba(0,255,65,0.15);
  padding: 10px 24px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); display: none;
}
.sandbox-banner.visible { display: block; }
.sandbox-banner a {
  color: var(--green); text-decoration: none; font-weight: 700;
}
.sandbox-banner a:hover { text-decoration: underline; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .index-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .detail-row { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .index-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .filter-bar { gap: 6px; }
  .detail-hero { padding: 32px 0 24px; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>
<script>
var SANDBOX_MODE = sessionStorage.getItem('aof_sandbox') === '1';
if (!SANDBOX_MODE && sessionStorage.getItem('aof_cw_auth') !== '1') { window.location.href = '/community/index.html'; }
</script>
<div class="scroll-progress" id="scrollProgress"></div>
<div class="sandbox-banner" id="sandboxBanner">Viewing free preview &mdash; <a href="https://whop.com/ai-ops-forge/">Join the community</a> for the full library</div>
<button class="floating-theme-toggle" id="floatingThemeToggle">&#9728;</button>
<div class="container">
  <a href="/community/index.html" class="back-link" id="hubLink">&larr; back to hub</a>

  <!-- INDEX VIEW -->
  <div id="indexView">
    <div class="page-header">
      <div class="dot-bg"></div>
      <div class="page-label">prompts</div>
      <h1 class="page-title">Prompts</h1>
      <p class="page-subtitle">Production-tested prompt library. Copy, adapt, and deploy prompts that actually work at scale.</p>
    </div>
    <div class="stats-row" id="statsRow"></div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="index-grid" id="indexGrid"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detailView" style="display:none">
    <div id="detailHeader"></div>
    <div class="detail-sections" id="detailSections"></div>
  </div>
</div>
<footer class="footer">
  <div class="footer-inner">
    <span style="font-family: 'JetBrains Mono', monospace;">AIOpsForge &middot; Community Workspace</span>
    <div class="footer-links">
      <a href="/community/index.html">Hub</a>
      <a href="../index.html">Home</a>
    </div>
    <span>built by an engineer who ships</span>
  </div>
</footer>
<script>
// ============ DATA ============
var PROMPTS_DATA = [
  {
    id: 'system-architecture-reviewer',
    title: 'System Architecture Reviewer',
    oneLiner: 'Get a senior architect-level critique of any system design document.',
    category: 'Engineering',
    model: 'Claude Opus 4.7',
    prompt: 'You are a senior systems architect with 15+ years of experience reviewing distributed system designs.\n\nI will provide you with a system design document. Analyze it thoroughly and return a structured review covering:\n\n1. ARCHITECTURE RISKS\n   - List each risk with severity (Critical / High / Medium / Low)\n   - Explain the failure scenario for each risk\n   - Suggest a mitigation strategy\n\n2. MISSING COMPONENTS\n   - Identify any standard components that are absent (monitoring, auth, rate limiting, etc.)\n   - Explain why each missing component matters\n\n3. SCALABILITY BOTTLENECKS\n   - Identify components that will fail first under 10x load\n   - Suggest horizontal vs vertical scaling strategies\n\n4. SECURITY CONCERNS\n   - Check for OWASP Top 10 exposure\n   - Evaluate data flow for encryption gaps\n   - Flag any overly permissive access patterns\n\n5. RECOMMENDED IMPROVEMENTS\n   - Prioritize by impact (High / Medium / Low)\n   - Include estimated implementation effort\n   - Reference industry best practices where applicable\n\nFormat your response as structured markdown with clear headers and bullet points.\n\n---\n\nSystem Design Document:\n{paste_your_design_here}',
    variables: [
      {
        name: '{paste_your_design_here}',
        description: 'Your complete system design document. Include architecture diagrams as text descriptions, component inventories, data flow descriptions, technology stack choices, and any constraints or requirements.',
        example: 'e.g. "Microservices architecture with API Gateway, 3 services (auth, orders, inventory), PostgreSQL, Redis cache, deployed on AWS ECS..."'
      }
    ],

    exampleOutput: '# Architecture Review: E-Commerce Microservices Platform\n\n## 1. ARCHITECTURE RISKS\n\n### Critical\n- **Single Point of Failure: API Gateway**\n  All traffic routes through one gateway instance with no failover.\n  If this component fails, the entire platform goes offline.\n  Mitigation: Deploy in active-active configuration across 2+ AZs\n  with health-check-based failover.\n\n### High\n- **Synchronous Inter-Service Communication**\n  Order service makes synchronous calls to inventory and payment.\n  A timeout in either cascades to order failures.\n  Mitigation: Circuit breaker pattern (Resilience4j) + event-driven\n  architecture for non-critical paths.\n\n## 2. MISSING COMPONENTS\n\n- **Distributed Tracing** — No request tracing across services.\n  Debugging production issues will be extremely difficult without\n  correlation IDs. Recommend: OpenTelemetry + Jaeger.\n\n- **Rate Limiting** — No rate limiting at gateway or service level.\n  Vulnerable to abuse and cascade failures from traffic spikes.\n  Recommend: Token bucket at gateway level.\n\n## 3. SCALABILITY BOTTLENECKS\n\n- **PostgreSQL (Orders DB)** — Single write replica.\n  At 10x current load (~5,000 orders/min), write throughput\n  will saturate. Consider: read replicas for queries, CQRS\n  pattern, or sharding by customer_id.\n\n## 4. SECURITY CONCERNS\n\n- **No mTLS between services** — Internal traffic is unencrypted.\n  Lateral movement risk if any service is compromised.\n\n## 5. RECOMMENDED IMPROVEMENTS\n\n| Priority | Improvement | Effort |\n|----------|-------------|--------|\n| High | Add circuit breakers | 2-3 days |\n| High | Implement distributed tracing | 1 week |\n| Medium | Add rate limiting at gateway | 1-2 days |\n| Medium | Enable mTLS for service mesh | 1 week |',

    howItWorks: 'This prompt is modeled after real incident response workflows used by on-call data engineers at companies like Airbnb, Netflix, and Stripe.\n\nThe first technique is classification forcing. By requiring the AI to categorize the error into a specific type (Schema, Connection, Timeout, etc.) and severity level (P0 through P3), it prevents vague answers like "something went wrong with the connection." Classification forces precision and helps you communicate the issue to stakeholders in a language they understand. When you say "P1 Connection Timeout affecting 3 downstream dashboards," everyone knows the urgency.\n\nThe second technique is timeline reconstruction. The prompt asks for "what happened in what order," which forces the AI to read the timestamps in your logs and build a narrative sequence. This is critical because pipeline failures are rarely caused by a single event. Usually, one thing fails, which causes a cascade. By reconstructing the timeline, you can identify the first domino that fell, not just the loudest error in the logs.\n\nThird, it uses remediation prioritization. The prompt separates "immediate fix" from "prevention," which mirrors how real incident response works. You stop the bleeding first, then do the post-mortem. This structure prevents the common mistake of jumping to long-term solutions while data is still stale and dashboards are still broken.',

    howItWorks: 'This prompt leverages psychological principles of drip marketing that have been refined over decades of email marketing.\n\nThe first technique is drip sequence psychology. The 5 emails are not random -- they follow a proven emotional arc: curiosity (teaser) to excitement (announcement) to understanding (deep dive) to trust (social proof) to urgency (last chance). Each email targets a different decision-making stage. The teaser creates awareness, the announcement converts early adopters, the deep dive satisfies analytical buyers, social proof reassures the cautious, and the last chance activates procrastinators. Skipping any stage leaves a segment of your audience unconverted.\n\nThe second technique is urgency escalation. Notice how each email ramps up the pressure: the teaser is relaxed, the announcement has excitement, and the final email uses deadline urgency. This mirrors the natural buying process -- people need multiple touchpoints before committing, and each touchpoint should feel slightly more urgent than the last without being pushy.\n\nThird, the prompt enforces mobile-optimized copy patterns. Rules like "150-200 words per email body" and "short paragraphs" are not arbitrary. Over 60% of emails are read on phones, where long paragraphs cause readers to scroll away. By constraining the word count, the prompt forces concise, scannable copy that performs on small screens.',

// ============ STATE ============
var activeFilter = 'all';

// ============ HELPERS ============
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function findById(id) {
  for (var i = 0; i < PROMPTS_DATA.length; i++) {
    if (PROMPTS_DATA[i].id === id) return PROMPTS_DATA[i];
  }
  return null;
}

function getFiltered() {
  if (activeFilter === 'all') return PROMPTS_DATA;
  return PROMPTS_DATA.filter(function(p) { return p.category === activeFilter; });
}

// ============ ROUTING ============
function route() {
  var hash = window.location.hash.slice(1);
  var item = hash ? findById(hash) : null;
  if (item) {
    showDetail(item);
  } else {
    showIndex();
  }
}

function showIndex() {
  document.getElementById('indexView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  document.title = 'Prompts \u2014 AIOpsForge';
  renderStats();
  renderFilters();
  renderGrid();
  window.scrollTo(0, 0);
}

function showDetail(item) {
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.title = item.title + ' \u2014 AIOpsForge Prompts';
  renderDetailHeader(item);
  renderDetailSections(item);
  window.scrollTo(0, 0);
}

function goBack() {
  history.pushState('', '', window.location.pathname);
  showIndex();
}

// ============ INDEX RENDERING ============
function renderStats() {
  var cats = {};
  PROMPTS_DATA.forEach(function(p) { cats[p.category] = true; });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + PROMPTS_DATA.length + '</span><span class="stat-label">prompts</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(cats).length + '</span><span class="stat-label">categories</span></div>';
}

function renderFilters() {
  var cats = {};
  PROMPTS_DATA.forEach(function(p) { cats[p.category] = (cats[p.category] || 0) + 1; });
  var html = '<button class="filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(cats).forEach(function(c) {
    html += '<button class="filter-btn' + (activeFilter === c ? ' active' : '') + '" onclick="setFilter(\'' + c + '\', this)">' + c + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function renderGrid() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(p) {
    html += '<a class="index-card" href="#' + p.id + '">' +
      '<span class="index-card-tag">' + escapeHtml(p.category) + '</span>' +
      '<h3 class="index-card-title">' + escapeHtml(p.title) + '</h3>' +
      '<p class="index-card-desc">' + escapeHtml(p.oneLiner) + '</p>' +
      '<span class="index-card-meta">best with: ' + escapeHtml(p.model) + '</span>' +
    '</a>';
  });
  if (filtered.length === 0) {
    html = '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center; padding:40px 0;">No prompts in this category yet.</p>';
  }
  document.getElementById('indexGrid').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// ============ INTERACTIONS ============
function copyPromptText(btn) {
  var block = document.getElementById('promptBlock');
  if (!block) return;
  var text = block.textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showCopied(btn); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  }
}

function showCopied(btn) {
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(function() {
    btn.textContent = 'Copy';
    btn.classList.remove('copied');
  }, 1500);
}

function toggleExample(btn) {
  var content = document.getElementById('exampleContent');
  if (!content) return;
  content.classList.toggle('expanded');
  if (content.classList.contains('expanded')) {
    btn.innerHTML = '&#9660; collapse';
  } else {
    btn.innerHTML = '&#9654; expand';
  }
}

// ============ CURSOR-TRACKING GLOW ============
(function() {
  document.addEventListener('mousemove', function(e) {
    var cards = document.querySelectorAll('.index-card, .detail-section, .related-card');
    cards.forEach(function(card) {
      var rect = card.getBoundingClientRect();
      card.style.setProperty('--mouse-x', (e.clientX - rect.left) + 'px');
      card.style.setProperty('--mouse-y', (e.clientY - rect.top) + 'px');
    });
  });
})();

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();
