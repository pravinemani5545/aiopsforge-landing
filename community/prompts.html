<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompts — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00FF41; --green-dim: #00cc34;
  --green-glow: rgba(0, 255, 65, 0.15); --green-glow-strong: rgba(0, 255, 65, 0.3);
  --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #161616;
  --bg-card: #1a1a1a; --bg-card-hover: #222222;
  --border: #2a2a2a; --border-green: rgba(0, 255, 65, 0.2);
  --text-primary: #f0f0f0; --text-secondary: #999999; --text-dim: #666666;
  --red: #ff4444; --blue: #4488ff;
  --accent: #10b981;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --green: #00892e; --green-dim: #006b24;
    --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
    --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
    --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
    --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
    --red: #cc3333; --blue: #2266cc;
    --accent: #059669;
  }
}
:root[data-theme="light"] {
  --green: #00892e; --green-dim: #006b24;
  --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
  --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
  --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
  --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
  --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
  --red: #cc3333; --blue: #2266cc;
  --accent: #059669;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-primary);
  color: var(--text-primary); line-height: 1.6; overflow-x: hidden;
}
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong), 0 0 40px var(--green-glow);
  z-index: 10000; transition: width 0.1s linear;
}
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px;
}
.back-link:hover { color: var(--green); }
.page-header {
  padding: 60px 0 40px; text-align: center; position: relative;
}
.page-header::before {
  content: ''; position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 16px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 5vw, 42px);
  font-weight: 700; margin-bottom: 12px; position: relative;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  margin: 0 auto; line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; justify-content: center; gap: 40px;
  padding: 0 0 32px; position: relative;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Space Grotesk', sans-serif; font-size: 28px;
  font-weight: 700; color: var(--accent); display: block;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
}

/* ============ FILTER BAR ============ */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-bottom: 24px; position: relative;
}
.filter-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 1px; padding: 8px 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--border-green); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(16, 185, 129, 0.08); border-color: var(--accent);
  color: var(--accent);
}

/* ============ INDEX GRID ============ */
.index-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.index-card {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: flex;
  flex-direction: column; gap: 12px;
}
.index-card:hover {
  border-color: var(--border-green); background: var(--bg-card-hover);
}
.index-card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border: 1px solid var(--border);
  color: var(--text-dim); background: var(--bg-tertiary);
  display: inline-block; align-self: flex-start;
}
.index-card-title {
  font-family: 'Space Grotesk', sans-serif; font-size: 17px;
  font-weight: 700; line-height: 1.3;
}
.index-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  flex: 1;
}
.index-card-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-dim); padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* ============ DETAIL VIEW ============ */
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; cursor: pointer;
  transition: color 0.2s; padding: 24px 0 0; border: none;
  background: none;
}
.detail-back:hover { color: var(--green); }
.detail-hero {
  padding: 40px 0 32px; position: relative;
}
.detail-hero::before {
  content: ''; position: absolute; top: -20px; left: 0;
  width: 400px; height: 200px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.detail-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
  margin-bottom: 12px; position: relative;
}
.detail-title {
  font-family: 'Space Grotesk', sans-serif; font-size: clamp(24px, 4vw, 36px);
  font-weight: 700; margin-bottom: 10px; position: relative;
}
.detail-desc {
  color: var(--text-secondary); font-size: 15px;
  max-width: 700px; line-height: 1.7; margin-bottom: 16px; position: relative;
}
.detail-model {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); border: 1px solid var(--border);
  padding: 4px 12px; display: inline-block; background: var(--bg-tertiary);
  position: relative;
}

/* ============ DETAIL SECTIONS GRID ============ */
.detail-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; padding-bottom: 60px;
}
.detail-section {
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 24px; position: relative;
}
.detail-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
}
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.section-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent);
}

/* ============ SECTION: THE PROMPT ============ */
.prompt-code-block {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  padding: 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 12px; line-height: 1.7; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word;
  max-height: 340px; overflow-y: auto;
}
.prompt-code-block::-webkit-scrollbar { width: 6px; }
.prompt-code-block::-webkit-scrollbar-track { background: var(--bg-tertiary); }
.prompt-code-block::-webkit-scrollbar-thumb { background: var(--border); }
.copy-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; padding: 5px 12px; cursor: pointer;
  background: transparent; border: 1px solid rgba(16, 185, 129, 0.4);
  color: var(--accent); transition: all 0.2s;
}
.copy-btn:hover { background: rgba(16, 185, 129, 0.08); }
.copy-btn.copied { background: rgba(16, 185, 129, 0.12); border-color: var(--accent); }

/* ============ SECTION: VARIABLES ============ */
.var-list { display: flex; flex-direction: column; gap: 16px; }
.var-item {
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.var-item:last-child { border-bottom: none; padding-bottom: 0; }
.var-name {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--accent); margin-bottom: 4px; font-weight: 700;
}
.var-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}
.var-example {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); margin-top: 6px;
  padding: 4px 8px; background: var(--bg-tertiary);
  border: 1px solid var(--border); display: inline-block;
}

/* ============ SECTION: EXAMPLE OUTPUT ============ */
.example-toggle {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 1px; padding: 5px 12px; cursor: pointer;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); transition: all 0.2s;
}
.example-toggle:hover { border-color: var(--border-green); color: var(--text-primary); }
.example-content {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  padding: 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; line-height: 1.7; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word;
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
}
.example-content.expanded { max-height: 600px; overflow-y: auto; }
.example-content::-webkit-scrollbar { width: 6px; }
.example-content::-webkit-scrollbar-track { background: var(--bg-tertiary); }
.example-content::-webkit-scrollbar-thumb { background: var(--border); }
.example-placeholder {
  font-size: 13px; color: var(--text-dim); font-style: italic;
  padding: 20px 0;
}

/* ============ SECTION: PRO TIPS ============ */
.tips-list { display: flex; flex-direction: column; gap: 14px; }
.tip-item { display: flex; gap: 12px; align-items: flex-start; }
.tip-num {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 700; color: var(--accent); min-width: 20px;
  line-height: 1.6;
}
.tip-text {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}

/* ============ SANDBOX BANNER ============ */
.sandbox-banner {
  background: rgba(0,255,65,0.06); border-bottom: 1px solid rgba(0,255,65,0.15);
  padding: 10px 24px; text-align: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); display: none;
}
.sandbox-banner.visible { display: block; }
.sandbox-banner a {
  color: var(--green); text-decoration: none; font-weight: 700;
}
.sandbox-banner a:hover { text-decoration: underline; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1100px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .index-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .page-header { padding: 40px 0 32px; }
  .index-grid { grid-template-columns: 1fr; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .stats-row { gap: 24px; }
  .filter-bar { gap: 6px; }
  .detail-hero { padding: 32px 0 24px; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<script>
// ============ DATA ============
var PROMPTS_DATA = [
  {
    id: 'system-architecture-reviewer',
    title: 'System Architecture Reviewer',
    oneLiner: 'Get a senior architect-level critique of any system design document.',
    category: 'Engineering',
    model: 'Claude Opus 4.7',
    prompt: 'You are a senior systems architect with 15+ years of experience reviewing distributed system designs.\n\nI will provide you with a system design document. Analyze it thoroughly and return a structured review covering:\n\n1. ARCHITECTURE RISKS\n   - List each risk with severity (Critical / High / Medium / Low)\n   - Explain the failure scenario for each risk\n   - Suggest a mitigation strategy\n\n2. MISSING COMPONENTS\n   - Identify any standard components that are absent (monitoring, auth, rate limiting, etc.)\n   - Explain why each missing component matters\n\n3. SCALABILITY BOTTLENECKS\n   - Identify components that will fail first under 10x load\n   - Suggest horizontal vs vertical scaling strategies\n\n4. SECURITY CONCERNS\n   - Check for OWASP Top 10 exposure\n   - Evaluate data flow for encryption gaps\n   - Flag any overly permissive access patterns\n\n5. RECOMMENDED IMPROVEMENTS\n   - Prioritize by impact (High / Medium / Low)\n   - Include estimated implementation effort\n   - Reference industry best practices where applicable\n\nFormat your response as structured markdown with clear headers and bullet points.\n\n---\n\nSystem Design Document:\n{paste_your_design_here}',
    variables: [
      {
        name: '{paste_your_design_here}',
        description: 'Your complete system design document. Include architecture diagrams as text descriptions, component inventories, data flow descriptions, technology stack choices, and any constraints or requirements.',
        example: 'e.g. "Microservices architecture with API Gateway, 3 services (auth, orders, inventory), PostgreSQL, Redis cache, deployed on AWS ECS..."'
      }
    ],
    exampleOutput: '# Architecture Review: E-Commerce Microservices Platform\n\n## 1. ARCHITECTURE RISKS\n\n### Critical\n- **Single Point of Failure: API Gateway**\n  All traffic routes through one gateway instance with no failover.\n  If this component fails, the entire platform goes offline.\n  Mitigation: Deploy in active-active configuration across 2+ AZs\n  with health-check-based failover.\n\n### High\n- **Synchronous Inter-Service Communication**\n  Order service makes synchronous calls to inventory and payment.\n  A timeout in either cascades to order failures.\n  Mitigation: Circuit breaker pattern (Resilience4j) + event-driven\n  architecture for non-critical paths.\n\n## 2. MISSING COMPONENTS\n\n- **Distributed Tracing** — No request tracing across services.\n  Debugging production issues will be extremely difficult without\n  correlation IDs. Recommend: OpenTelemetry + Jaeger.\n\n- **Rate Limiting** — No rate limiting at gateway or service level.\n  Vulnerable to abuse and cascade failures from traffic spikes.\n  Recommend: Token bucket at gateway level.\n\n## 3. SCALABILITY BOTTLENECKS\n\n- **PostgreSQL (Orders DB)** — Single write replica.\n  At 10x current load (~5,000 orders/min), write throughput\n  will saturate. Consider: read replicas for queries, CQRS\n  pattern, or sharding by customer_id.\n\n## 4. SECURITY CONCERNS\n\n- **No mTLS between services** — Internal traffic is unencrypted.\n  Lateral movement risk if any service is compromised.\n\n## 5. RECOMMENDED IMPROVEMENTS\n\n| Priority | Improvement | Effort |\n|----------|-------------|--------|\n| High | Add circuit breakers | 2-3 days |\n| High | Implement distributed tracing | 1 week |\n| Medium | Add rate limiting at gateway | 1-2 days |\n| Medium | Enable mTLS for service mesh | 1 week |',
    proTips: [
      'Include your current scale numbers (requests/sec, data volume, user count) — the reviewer calibrates bottleneck analysis to your actual load, not theoretical limits.',
      'Mention your team size and expertise level — recommendations will account for what you can realistically build and maintain.',
      'Paste your architecture as structured text (component list + data flow), not just a diagram description — structured input produces structured output.',
      'If you have a specific concern, state it explicitly at the top — "I\'m worried about database scaling under Black Friday traffic" focuses the review on what matters most.'
    ]
  },
  {
    id: 'seo-blog-post-generator',
    title: 'SEO Blog Post Generator',
    oneLiner: 'Generate a complete, SEO-optimized blog post with meta tags and internal linking suggestions.',
    category: 'Content',
    model: 'Claude Sonnet 4.6',
    prompt: 'You are an expert content strategist and SEO specialist.\n\nWrite a complete blog post based on the following inputs:\n\nTOPIC: {your_topic}\nPRIMARY KEYWORD: {main_keyword}\nSECONDARY KEYWORDS: {keyword_1, keyword_2, keyword_3}\nTARGET WORD COUNT: {word_count}\nTONE: {tone}\n\nRequirements:\n\n1. TITLE\n   - Include the primary keyword\n   - Under 60 characters\n   - Use a power word (proven, essential, complete, etc.)\n\n2. META DESCRIPTION\n   - 150-160 characters\n   - Include primary keyword naturally\n   - End with a value proposition or CTA\n\n3. STRUCTURE\n   - Opening hook (2-3 sentences, no fluff)\n   - H2 sections (4-6 main sections)\n   - H3 subsections where depth is needed\n   - Conclusion with clear takeaway\n\n4. SEO RULES\n   - Primary keyword in first 100 words\n   - Secondary keywords distributed naturally (1-2x each)\n   - Short paragraphs (2-4 sentences max)\n   - Use bullet points and numbered lists\n   - Include one data point or statistic per section\n\n5. INTERNAL LINKING\n   - Suggest 3-5 internal link opportunities with anchor text\n   - Format: [anchor text] -> /suggested-slug\n\nOutput the complete post in markdown format.',
    variables: [
      {
        name: '{your_topic}',
        description: 'The main subject of the blog post. Be specific — the narrower the topic, the better the output.',
        example: 'e.g. "Next.js App Router migration guide"'
      },
      {
        name: '{main_keyword}',
        description: 'Primary SEO keyword to target. Use a keyword research tool to find one with decent search volume and manageable competition.',
        example: 'e.g. "next.js app router migration"'
      },
      {
        name: '{keyword_1, keyword_2, keyword_3}',
        description: 'Related long-tail keywords. Aim for variants and related queries of your primary keyword.',
        example: 'e.g. "pages router to app router, next.js 15 routing, react server components migration"'
      },
      {
        name: '{word_count}',
        description: 'Target word count. 1500 for focused listicles, 2000 for standard guides, 2500 for comprehensive pillar content.',
        example: 'e.g. "2000"'
      },
      {
        name: '{tone}',
        description: 'Writing tone that matches your brand voice. Choose professional, conversational, or technical.',
        example: 'e.g. "technical"'
      }
    ],
    exampleOutput: '# The Complete Guide to Next.js App Router Migration (2026)\n\n**Meta Description:** Learn how to migrate from Next.js\nPages Router to App Router with our step-by-step guide.\nCovers routing, data fetching, and common pitfalls.\nStart migrating today.\n\n---\n\nMoving from Pages Router to App Router isn\'t just an\nupgrade — it\'s a fundamental shift in how you build\nReact applications. After migrating three production\napps, here\'s everything you need to know.\n\n## Why Migrate to App Router Now\n\nThe Pages Router isn\'t deprecated yet, but the writing\nis on the wall. All new Next.js features ship exclusively\nfor App Router. According to the Next.js 2025 survey,\n73% of new projects now start with App Router.\n\n## Step-by-Step Migration Strategy\n\n### 1. Audit Your Current Routes\nBefore touching any code, map every route in your\napplication. Create a spreadsheet with columns:\nroute path, data fetching method, layout dependencies.\n\n### 2. Set Up Parallel Route Structure\nNext.js supports running both routers simultaneously...\n\n## Internal Linking Suggestions\n- [server components guide] -> /blog/react-server-components\n- [data fetching patterns] -> /blog/nextjs-data-fetching\n- [deployment checklist] -> /blog/nextjs-deployment-guide',
    proTips: [

// ============ STATE ============
var activeFilter = 'all';

// ============ HELPERS ============
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function findById(id) {
  for (var i = 0; i < PROMPTS_DATA.length; i++) {
    if (PROMPTS_DATA[i].id === id) return PROMPTS_DATA[i];
  }
  return null;
}

function getFiltered() {
  if (activeFilter === 'all') return PROMPTS_DATA;
  return PROMPTS_DATA.filter(function(p) { return p.category === activeFilter; });
}

// ============ ROUTING ============
function route() {
  var hash = window.location.hash.slice(1);
  var item = hash ? findById(hash) : null;
  if (item) {
    showDetail(item);
  } else {
    showIndex();
  }
}

function showIndex() {
  document.getElementById('indexView').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  document.title = 'Prompts \u2014 AIOpsForge';
  renderStats();
  renderFilters();
  renderGrid();
  window.scrollTo(0, 0);
}

function showDetail(item) {
  document.getElementById('indexView').style.display = 'none';
  document.getElementById('detailView').style.display = '';
  document.title = item.title + ' \u2014 AIOpsForge Prompts';
  renderDetailHeader(item);
  renderDetailSections(item);
  window.scrollTo(0, 0);
}

function goBack() {
  history.pushState('', '', window.location.pathname);
  showIndex();
}

// ============ INDEX RENDERING ============
function renderStats() {
  var filtered = getFiltered();
  var cats = {};
  PROMPTS_DATA.forEach(function(p) { cats[p.category] = true; });
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + PROMPTS_DATA.length + '</span><span class="stat-label">prompts</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + Object.keys(cats).length + '</span><span class="stat-label">categories</span></div>';
}

function renderFilters() {
  var cats = {};
  PROMPTS_DATA.forEach(function(p) { cats[p.category] = (cats[p.category] || 0) + 1; });
  var html = '<button class="filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" onclick="setFilter(\'all\', this)">All</button>';
  Object.keys(cats).forEach(function(c) {
    html += '<button class="filter-btn' + (activeFilter === c ? ' active' : '') + '" onclick="setFilter(\'' + c + '\', this)">' + c + '</button>';
  });
  document.getElementById('filterBar').innerHTML = html;
}

function renderGrid() {
  var filtered = getFiltered();
  var html = '';
  filtered.forEach(function(p) {
    html += '<a class="index-card" href="#' + p.id + '">' +
      '<span class="index-card-tag">' + escapeHtml(p.category) + '</span>' +
      '<h3 class="index-card-title">' + escapeHtml(p.title) + '</h3>' +
      '<p class="index-card-desc">' + escapeHtml(p.oneLiner) + '</p>' +
      '<span class="index-card-meta">best with: ' + escapeHtml(p.model) + '</span>' +
    '</a>';
  });
  if (filtered.length === 0) {
    html = '<p style="color:var(--text-dim); grid-column:1/-1; text-align:center; padding:40px 0;">No prompts in this category yet.</p>';
  }
  document.getElementById('indexGrid').innerHTML = html;
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

// ============ DETAIL RENDERING ============
function renderDetailHeader(item) {
  document.getElementById('detailHeader').innerHTML =
    '<button class="detail-back" onclick="goBack()">&larr; back to all prompts</button>' +
    '<div class="detail-hero">' +
      '<div class="detail-tag">' + escapeHtml(item.category) + '</div>' +
      '<h1 class="detail-title">' + escapeHtml(item.title) + '</h1>' +
      '<p class="detail-desc">' + escapeHtml(item.oneLiner) + '</p>' +
      '<span class="detail-model">best with: ' + escapeHtml(item.model) + '</span>' +
    '</div>';
}

function renderDetailSections(item) {
  var html = '';

  // Section 1: THE PROMPT
  html += '<div class="detail-section">' +
    '<div class="section-header">' +
      '<span class="section-label">the prompt</span>' +
      '<button class="copy-btn" onclick="copyPromptText(this)">Copy</button>' +
    '</div>' +
    '<div class="prompt-code-block" id="promptBlock">' + escapeHtml(item.prompt) + '</div>' +
  '</div>';

  // Section 2: VARIABLES & CUSTOMIZATION
  html += '<div class="detail-section">' +
    '<div class="section-header">' +
      '<span class="section-label">variables & customization</span>' +
    '</div>';
  if (item.variables && item.variables.length > 0) {
    html += '<div class="var-list">';
    item.variables.forEach(function(v) {
      html += '<div class="var-item">' +
        '<div class="var-name">' + escapeHtml(v.name) + '</div>' +
        '<div class="var-desc">' + escapeHtml(v.description) + '</div>';
      if (v.example) {
        html += '<div class="var-example">' + escapeHtml(v.example) + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="example-placeholder">No variables documented yet.</p>';
  }
  html += '</div>';

  // Section 3: EXAMPLE OUTPUT
  html += '<div class="detail-section">' +
    '<div class="section-header">' +
      '<span class="section-label">example output</span>' +
      (item.exampleOutput ? '<button class="example-toggle" onclick="toggleExample(this)">&#9654; expand</button>' : '') +
    '</div>';
  if (item.exampleOutput) {
    html += '<div class="example-content" id="exampleContent">' + escapeHtml(item.exampleOutput) + '</div>';
  } else {
    html += '<p class="example-placeholder">Example output coming soon. This prompt is a template — content will be added as the library grows.</p>';
  }
  html += '</div>';

  // Section 4: PRO TIPS
  html += '<div class="detail-section">' +
    '<div class="section-header">' +
      '<span class="section-label">pro tips</span>' +
    '</div>';
  if (item.proTips && item.proTips.length > 0) {
    html += '<div class="tips-list">';
    item.proTips.forEach(function(tip, i) {
      html += '<div class="tip-item">' +
        '<span class="tip-num">' + (i + 1) + '</span>' +
        '<span class="tip-text">' + escapeHtml(tip) + '</span>' +
      '</div>';
    });
    html += '</div>';
  } else {
    html += '<p class="example-placeholder">Tips coming soon.</p>';
  }
  html += '</div>';

  document.getElementById('detailGrid').innerHTML = html;
}

// ============ INTERACTIONS ============
function copyPromptText(btn) {
  var block = document.getElementById('promptBlock');
  if (!block) return;
  var text = block.textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showCopied(btn); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  }
}

function showCopied(btn) {
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(function() {
    btn.textContent = 'Copy';
    btn.classList.remove('copied');
  }, 1500);
}

function toggleExample(btn) {
  var content = document.getElementById('exampleContent');
  if (!content) return;
  content.classList.toggle('expanded');
  if (content.classList.contains('expanded')) {
    btn.innerHTML = '&#9660; collapse';
  } else {
    btn.innerHTML = '&#9654; expand';
  }
}

// ============ THEME & SCROLL ============
(function() {
  var root = document.documentElement;
  var floatingToggle = document.getElementById('floatingThemeToggle');
  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    var icon = theme === 'light' ? '\u263E' : '\u2600';
    if (floatingToggle) floatingToggle.textContent = icon;
  }
  var stored = localStorage.getItem('aof_theme');
  applyTheme(stored || 'dark');
  function handleToggle() {
    var current = root.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    applyTheme(next);
  }
  if (floatingToggle) floatingToggle.addEventListener('click', handleToggle);
  var scrollBar = document.getElementById('scrollProgress');
  if (scrollBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var percent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      scrollBar.style.width = percent + '%';
    }, { passive: true });
  }
})();

// ============ SANDBOX MODE ============
if (SANDBOX_MODE) {
  PROMPTS_DATA = PROMPTS_DATA.filter(function(p) { return p.id === 'system-architecture-reviewer'; });
  document.getElementById('sandboxBanner').classList.add('visible');
  document.getElementById('hubLink').href = '/sandbox/';
  document.getElementById('hubLink').innerHTML = '&larr; back to sandbox';
}

// ============ INIT ============
window.addEventListener('hashchange', route);
route();
</script>
