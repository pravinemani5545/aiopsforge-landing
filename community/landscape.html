<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Landscape — AIOpsForge</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00FF41; --green-dim: #00cc34;
  --green-glow: rgba(0, 255, 65, 0.15); --green-glow-strong: rgba(0, 255, 65, 0.3);
  --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #161616;
  --bg-card: #1a1a1a; --bg-card-hover: #222222;
  --border: #2a2a2a; --border-green: rgba(0, 255, 65, 0.2);
  --text-primary: #f0f0f0; --text-secondary: #999999; --text-dim: #666666;
  --red: #ff4444; --blue: #4488ff;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --green: #00892e; --green-dim: #006b24;
    --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
    --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
    --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
    --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
    --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
    --red: #cc3333; --blue: #2266cc;
  }
}
:root[data-theme="light"] {
  --green: #00892e; --green-dim: #006b24;
  --green-glow: rgba(0, 137, 46, 0.12); --green-glow-strong: rgba(0, 137, 46, 0.25);
  --bg-primary: #f5f5f5; --bg-secondary: #ebebeb; --bg-tertiary: #e0e0e0;
  --bg-card: #ffffff; --bg-card-hover: #f8f8f8;
  --border: #d4d4d4; --border-green: rgba(0, 137, 46, 0.2);
  --text-primary: #1a1a1a; --text-secondary: #555555; --text-dim: #888888;
  --red: #cc3333; --blue: #2266cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ============ SCROLL PROGRESS ============ */
.scroll-progress {
  position: fixed; top: 0; left: 0; width: 0%; height: 3px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow-strong);
  z-index: 10000; transition: width 0.1s linear;
}

/* ============ THEME TOGGLE ============ */
.floating-theme-toggle {
  position: fixed; top: 20px; right: 24px; z-index: 999;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); cursor: pointer;
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}
.floating-theme-toggle:hover { color: var(--green); border-color: var(--border-green); }

/* ============ CONTAINER ============ */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ============ PAGE HEADER ============ */
.page-header { padding: 80px 0 32px; position: relative; }
.page-header::before {
  content: ''; position: absolute; top: 0; left: 0; width: 400px; height: 400px;
  background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
  pointer-events: none; opacity: 0.6;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-dim); text-decoration: none; transition: color 0.2s;
  padding-top: 24px; margin-bottom: 8px; position: relative;
}
.back-link:hover { color: var(--green); }
.page-label {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--green);
  margin-bottom: 12px; position: relative;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(32px, 5vw, 48px); font-weight: 700;
  margin-bottom: 8px; position: relative; line-height: 1.1;
}
.page-subtitle {
  color: var(--text-secondary); font-size: 15px; max-width: 600px;
  line-height: 1.7; position: relative;
}

/* ============ STATS ROW ============ */
.stats-row {
  display: flex; gap: 32px; padding: 20px 0; margin-bottom: 32px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
}
.stat-item { display: flex; align-items: baseline; gap: 6px; }
.stat-num { color: var(--green); font-weight: 700; font-size: 22px; }
.stat-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

/* ============ CATEGORY NAV (SIDEBAR + MAIN LAYOUT) ============ */
.landscape-layout { display: flex; gap: 0; min-height: 60vh; }

/* Sidebar */
.cat-sidebar {
  width: 260px; flex-shrink: 0; position: sticky; top: 20px; align-self: flex-start;
  padding-right: 24px; border-right: 1px solid var(--border);
}
.cat-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; cursor: pointer; transition: all 0.2s;
  border-left: 3px solid transparent; margin-bottom: 2px;
}
.cat-nav-item:hover { background: var(--bg-card-hover); }
.cat-nav-item.active { background: var(--bg-card); border-left-color: var(--green); }
.cat-nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-nav-name {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cat-nav-item.active .cat-nav-name { color: var(--text-primary); font-weight: 700; }
.cat-nav-count {
  margin-left: auto; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-dim);
}

/* Main content area */
.cat-content { flex: 1; padding-left: 32px; min-width: 0; }

/* ============ CATEGORY HEADER ============ */
.cat-header { margin-bottom: 24px; }
.cat-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.cat-header-dot { width: 12px; height: 12px; border-radius: 50%; }
.cat-header-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(22px, 3vw, 30px); font-weight: 700;
}
.cat-header-desc {
  color: var(--text-secondary); font-size: 14px; line-height: 1.7;
  max-width: 600px;
}

/* ============ SUBTASK CARDS ============ */
.subtask-card {
  background: var(--bg-card); border: 1px solid var(--border);
  margin-bottom: 12px; overflow: hidden;
  transition: border-color 0.2s;
}
.subtask-card:hover { border-color: var(--border-green); }
.subtask-trigger {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; cursor: pointer; user-select: none;
  transition: background 0.2s;
}
.subtask-trigger:hover { background: var(--bg-card-hover); }
.subtask-trigger-left { display: flex; align-items: center; gap: 12px; }
.subtask-name {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  font-weight: 700; color: var(--text-primary);
}
.subtask-metric-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.5px; padding: 3px 8px;
  color: var(--text-dim); border: 1px solid var(--border);
  background: var(--bg-tertiary); cursor: help; position: relative;
}
.subtask-metric-badge[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--bg-card); border: 1px solid var(--border-green); color: var(--text-secondary);
  font-size: 11px; letter-spacing: 0; text-transform: none;
  padding: 6px 10px; white-space: nowrap; z-index: 100;
  font-family: 'IBM Plex Sans', sans-serif;
}
.subtask-chevron {
  font-size: 12px; color: var(--text-dim); transition: transform 0.25s;
  font-family: 'JetBrains Mono', monospace;
}
.subtask-card.open .subtask-chevron { transform: rotate(90deg); }

/* Subtask body */
.subtask-body { display: none; padding: 0 20px 16px; }
.subtask-card.open .subtask-body { display: block; }

/* ============ MODEL ROWS ============ */
.model-row {
  display: grid; grid-template-columns: 24px 1fr auto auto auto;
  align-items: center; gap: 10px;
  padding: 10px 12px; margin-bottom: 4px;
  background: var(--bg-tertiary);
  border: 1px solid transparent; transition: all 0.2s;
}
.model-row.top-pick {
  border-color: rgba(0, 255, 65, 0.15);
  background: rgba(0, 255, 65, 0.04);
}
:root[data-theme="light"] .model-row.top-pick,
:root:not([data-theme="dark"]) .model-row.top-pick {
  background: rgba(0, 137, 46, 0.06);
  border-color: rgba(0, 137, 46, 0.18);
}
.model-star { color: #eab308; font-size: 14px; text-align: center; }
.model-name {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.model-row.top-pick .model-name { font-weight: 700; }
.model-badges { display: flex; gap: 4px; }
.badge {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 2px 6px;
}
.badge.os { color: var(--green); border: 1px solid rgba(0, 255, 65, 0.3); background: rgba(0, 255, 65, 0.08); }
.badge.cross { color: #22d3ee; border: 1px solid rgba(34, 211, 238, 0.3); background: rgba(34, 211, 238, 0.08); }

/* Metric column */
.model-metric {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--green); font-weight: 700; text-align: right; white-space: nowrap;
}
.model-row:not(.top-pick) .model-metric { color: var(--text-secondary); font-weight: 400; }
.model-provider {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-dim); white-space: nowrap; text-align: right;
}

/* ============ DETAIL EXPAND (per model) ============ */
.model-detail-toggle {
  cursor: pointer; transition: background 0.15s;
}
.model-detail-toggle:hover { background: var(--bg-card-hover); }
.model-expand {
  display: none; grid-column: 1 / -1;
  padding: 8px 12px 4px 36px;
  font-size: 12px; color: var(--text-secondary); line-height: 1.6;
  border-top: 1px solid var(--border); margin-top: 6px;
}
.model-row.expanded .model-expand { display: block; }

/* ============ METRIC BAR ============ */
.metric-bar-wrap {
  display: flex; align-items: center; gap: 8px;
  margin: 6px 0 2px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.metric-bar-label { color: var(--text-dim); width: 140px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.metric-bar-track {
  flex: 1; height: 6px; background: var(--bg-secondary); overflow: hidden; position: relative;
}
.metric-bar-fill { height: 100%; transition: width 0.6s ease; }
.metric-bar-value { color: var(--text-secondary); width: 65px; text-align: right; flex-shrink: 0; font-size: 10px; }

/* ============ LEGEND ============ */
.legend {
  display: flex; justify-content: flex-start; gap: 24px; flex-wrap: wrap;
  padding: 24px 0; border-top: 1px solid var(--border); margin-top: 32px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-secondary);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-star { color: #eab308; font-size: 13px; }

/* ============ FOOTER ============ */
.footer {
  padding: 40px 24px; border-top: 1px solid var(--border); text-align: center;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1200px; margin: 0 auto; font-size: 12px; color: var(--text-dim);
}
.footer a { color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--green); }
.footer-links { display: flex; gap: 24px; }

/* ============ UPDATED BADGE ============ */
.updated-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--green); padding: 4px 10px;
  border: 1px solid rgba(0, 255, 65, 0.2); background: rgba(0, 255, 65, 0.06);
  margin-top: 12px;
}
.updated-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ============ QUICK ANSWER ============ */
.quick-answer {
  background: var(--bg-card); border: 1px solid var(--border-green);
  padding: 20px; margin-bottom: 24px; position: relative;
}
.quick-answer::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--green);
}
.quick-answer-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--green);
  margin-bottom: 8px;
}
.quick-answer-text {
  font-size: 14px; line-height: 1.6; color: var(--text-primary);
}

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .landscape-layout { flex-direction: column; }
  .cat-sidebar {
    width: 100%; position: static; border-right: none;
    border-bottom: 1px solid var(--border); padding-right: 0; padding-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .cat-nav-item { padding: 8px 12px; border-left: none; border-bottom: 2px solid transparent; }
  .cat-nav-item.active { border-bottom-color: var(--green); border-left: none; }
  .cat-nav-count { display: none; }
  .cat-content { padding-left: 0; padding-top: 20px; }
}
@media (max-width: 600px) {
  .stats-row { gap: 16px; flex-wrap: wrap; }
  .model-row { grid-template-columns: 24px 1fr auto; gap: 6px; }
  .model-metric { grid-column: 2 / 3; }
  .model-provider { grid-column: 2 / -1; font-size: 10px; }
  .model-badges { grid-column: 3; }
  .page-header { padding: 60px 0 24px; }
  .footer-inner { flex-direction: column; gap: 16px; }
  .legend { gap: 16px; }
  .cat-nav-name { font-size: 11px; }
}
</style>
<script>
(function() {
  var t = localStorage.getItem('aof_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

  'DeepSearchQA %': 'Accuracy on complex research questions requiring multi-source synthesis',
  'Capability Assessment': 'Overall capability rating based on features, quality, and reliability',
  'Video-MMMU / MMMU-Pro': 'Combined video and image understanding scores',
  'AIME 2025 / FrontierMath': 'Advanced math competition and frontier math problem scores',
  'MOS / Naturalness': 'Mean Opinion Score — how natural the voice sounds to listeners',
  'WER %': 'Word Error Rate — lower = more accurate transcription',
  'Arena Music Elo': 'Music generation ranking — higher = more preferred by listeners',
  'Arena Video Elo': 'Video generation ranking — higher = more preferred by viewers',
  'Design Quality': 'Overall design quality assessment for branding and graphics'
};

// ============ RENDER ============

var activeCategory = 0;

function countStats() {
  var tools = 0, tasks = 0;
  LANDSCAPE_DATA.forEach(function(c) { c.subtasks.forEach(function(s) { tasks++; tools += s.models.length; }); });
  return { tools: tools, categories: LANDSCAPE_DATA.length, tasks: tasks };
}

function renderStats() {
  var s = countStats();
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-item"><span class="stat-num">' + s.tools + '</span><span class="stat-label">tools</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + s.categories + '</span><span class="stat-label">domains</span></div>' +
    '<div class="stat-item"><span class="stat-num">' + s.tasks + '</span><span class="stat-label">tasks</span></div>';
}

function renderSidebar() {
  var html = '';
  LANDSCAPE_DATA.forEach(function(c, i) {
    var tc = 0; c.subtasks.forEach(function(s) { tc += s.models.length; });
    html += '<div class="cat-nav-item' + (i === activeCategory ? ' active' : '') + '" data-idx="' + i + '">' +
      '<span class="cat-nav-dot" style="background:' + c.color + '"></span>' +
      '<span class="cat-nav-name">' + c.name + '</span>' +
      '<span class="cat-nav-count">' + tc + '</span>' +
    '</div>';
  });
  document.getElementById('catSidebar').innerHTML = html;
}

function renderContent(idx) {
  var cat = LANDSCAPE_DATA[idx];
  var html = '<div class="cat-header">' +
    '<div class="cat-header-top">' +
      '<span class="cat-header-dot" style="background:' + cat.color + ';box-shadow:0 0 8px ' + cat.color + '"></span>' +
      '<h2 class="cat-header-title">' + cat.name + '</h2>' +
    '</div>' +
    '<p class="cat-header-desc">' + cat.description + '</p>' +
  '</div>';

  if (cat.quickAnswer) {
    html += '<div class="quick-answer">' +
      '<div class="quick-answer-label">quick answer</div>' +
      '<div class="quick-answer-text">' + cat.quickAnswer + '</div>' +
    '</div>';
  }

  cat.subtasks.forEach(function(st, si) {
    html += '<div class="subtask-card' + (si === 0 ? ' open' : '') + '" id="st-' + idx + '-' + si + '">' +
      '<div class="subtask-trigger" onclick="toggleST(' + idx + ',' + si + ')">' +
        '<div class="subtask-trigger-left">' +
          '<span class="subtask-name">' + st.name + '</span>' +
          '<span class="subtask-metric-badge"' + (METRIC_TIPS[st.metric] ? ' data-tooltip="' + METRIC_TIPS[st.metric] + '"' : '') + '>' + st.metric + '</span>' +
        '</div>' +
        '<span class="subtask-chevron">&#9654;</span>' +
      '</div>' +
      '<div class="subtask-body">';

    st.models.forEach(function(m, mi) {
      var cls = 'model-row model-detail-toggle' + (m.topPick ? ' top-pick' : '');
      var star = m.topPick ? '&#9733;' : '';
      var badges = '';
      m.tags.forEach(function(t) {
        if (t === 'OS') badges += '<span class="badge os">OS</span>';
        else if (t === '3X') badges += '<span class="badge cross">3X</span>';
      });

      html += '<div class="' + cls + '" onclick="toggleModelDetail(this)">' +
        '<span class="model-star">' + star + '</span>' +
        '<span class="model-name">' + m.name + '</span>' +
        '<div class="model-badges">' + badges + '</div>' +
        '<span class="model-metric">' + m.score + '</span>' +
        '<span class="model-provider">' + m.provider + '</span>' +
        '<div class="model-expand">' +
          '<p style="margin-bottom:8px">' + m.detail + '</p>' +
          (m.pct > 0 ? renderMetricBar(m.name, m.pct, cat.color, st.metric) : '') +
        '</div>' +
      '</div>';
    });

    html += '</div></div>';
  });

  document.getElementById('catContent').innerHTML = html;
}

function renderMetricBar(name, pct, color, label) {
  return '<div class="metric-bar-wrap">' +
    '<span class="metric-bar-label">' + label + '</span>' +
    '<div class="metric-bar-track"><div class="metric-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
    '<span class="metric-bar-value">' + pct + '%</span>' +
  '</div>';
}

function toggleST(catIdx, stIdx) {
  var el = document.getElementById('st-' + catIdx + '-' + stIdx);
  if (el) el.classList.toggle('open');
}

function toggleModelDetail(row) {
  row.classList.toggle('expanded');
}

function switchCategory(idx) {
  activeCategory = idx;
  renderSidebar();
  renderContent(idx);
  if (window.innerWidth <= 900) {
    var content = document.getElementById('catContent');
    if (content) content.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ============ EVENT LISTENERS ============

document.getElementById('catSidebar').addEventListener('click', function(e) {
  var item = e.target.closest('.cat-nav-item');
  if (item) switchCategory(parseInt(item.getAttribute('data-idx')));
});

// ============ THEME & SCROLL ============

(function() {
  var root = document.documentElement;
  var btn = document.getElementById('floatingThemeToggle');
  function apply(theme) {
    root.setAttribute('data-theme', theme);
    if (btn) btn.textContent = theme === 'light' ? '\u263E' : '\u2600';
  }
  apply(localStorage.getItem('aof_theme') || 'dark');
  if (btn) btn.addEventListener('click', function() {
    var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    localStorage.setItem('aof_theme', next);
    apply(next);
  });
  var bar = document.getElementById('scrollProgress');
  if (bar) window.addEventListener('scroll', function() {
    var pct = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (pct > 0 ? (window.scrollY / pct) * 100 : 0) + '%';
  }, { passive: true });
})();

// ============ INIT ============
renderStats();
renderSidebar();
renderContent(0);
</script>
</body>
</html>
